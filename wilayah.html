<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monitoring Wilayah & Real-time - UPT PUSDA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1b3e">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e40af; 
            --bg-dark: #0d1b3e; 
            --glass: rgba(15, 32, 77, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #f97316;
            --success: #10b981;
            --danger: #ef4444;
            --pu-blue: #3b82f6;
            --sda-toska: #2dd4bf;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; min-height: 100vh; background: var(--bg-dark); color: #f8fafc; overflow-x: hidden; }
        body { display: flex; position: relative; width: 100vw; }
        
        .fixed-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at top right, #1e40af, #0d1b3e 85%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.3), transparent 70%); 
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 32, 77, 0.9); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .brand img { height: 42px; border-radius: 8px; }
        .nav-link { padding: 14px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.3s; font-weight: 600; margin-bottom: 5px; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: linear-gradient(135deg, var(--pu-blue), var(--primary)); color: white; box-shadow: 0 10px 20px rgba(30, 64, 175, 0.4); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: 312px; padding: 30px 20px 120px 10px; min-height: 100vh; display: flex; flex-direction: column; width: calc(100% - 312px); transition: 0.3s; }
        .dashboard-container { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; }
        .section-header h1 { font-size: clamp(1.1rem, 3.5vw, 1.6rem); font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .section-header h1::before { content: ''; width: 6px; height: 24px; background: var(--accent); border-radius: 3px; }

        .live-status { display: flex; align-items: center; gap: 8px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); padding: 6px 12px; border-radius: 20px; color: var(--success); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* --- KORLAP CARDS --- */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .korlap-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 32px; overflow: hidden; display: flex; flex-direction: column; }
        .korlap-profile-part { background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(45, 212, 191, 0.15)); padding: 22px; display: flex; align-items: center; gap: 18px; border-bottom: 1px solid var(--glass-border); }
        .korlap-foto { width: 62px; aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; border: 2px solid var(--sda-toska); background: radial-gradient(circle at center, rgba(59, 130, 246, 0.4), #0d1b3e); flex-shrink: 0; }
        .korlap-foto img { width: 100%; height: 100%; object-fit: cover; }
        .korlap-info h2 { font-size: 1.15rem; font-weight: 800; color: white; line-height: 1.1; }
        .korlap-stats-part { background: rgba(0,0,0,0.45); padding: 15px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .k-stat-item { text-align: center; }
        .k-stat-item b { display: block; font-size: 1.15rem; font-family: 'JetBrains Mono'; }
        .k-stat-item span { font-size: 0.55rem; font-weight: 800; opacity: 0.4; text-transform: uppercase; }

        /* --- MONITORING BOX --- */
        .monitoring-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 35px; padding: clamp(15px, 3vw, 25px); display: flex; flex-direction: column; gap: 20px; }
        .filter-canvas { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 6px; }
        .filter-item label { font-size: 0.65rem; font-weight: 800; color: var(--sda-toska); text-transform: uppercase; letter-spacing: 1px; margin-left: 10px; }
        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 14px; color: white; outline: none; font-weight: 600; width: 100%; font-size: 0.9rem; }

        /* --- CARD VIEW --- */
        .monitoring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .personel-card { background: rgba(15, 32, 77, 0.55); border: 1px solid var(--glass-border); border-radius: 32px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; }
        .p-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .pres-box { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .thumb-group-v2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .mini-thumb-v2 { aspect-ratio: 1/1; border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .mini-thumb-v2 img { width: 100%; height: 100%; object-fit: cover; }
        .btn-loc-wide { width: 100%; padding: 8px; border-radius: 10px; background: rgba(59, 130, 246, 0.15); color: var(--pu-blue); border: 1px solid rgba(59, 130, 246, 0.3); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.65rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* --- TABLE VIEW --- */
        .table-scroll { width: 100%; overflow-x: auto; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); display: none; }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 18px 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--sda-toska); letter-spacing: 0.5px; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--glass-border); font-size: 0.85rem; color: white; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .group-icons { display: flex; gap: 8px; justify-content: flex-start; }
        .i-btn { 
            width: 36px; height: 36px; border-radius: 10px; 
            border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; background: rgba(255,255,255,0.03); 
            color: rgba(255,255,255,0.15); transition: 0.2s;
        }
        .i-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .i-btn.active-h { color: var(--success); border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .i-btn.active-p { color: var(--accent); border-color: var(--accent); background: rgba(249, 115, 22, 0.1); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(13, 27, 62, 0.96); backdrop-filter: blur(15px); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { max-width: 440px; width: 100%; background: #0b1120; border-radius: 40px; border: 1px solid var(--glass-border); position: relative; overflow: hidden; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 10px 10px 140px 10px; width: 100%; }
            .monitoring-grid { grid-template-columns: 1fr; }
            .filter-canvas { grid-template-columns: 1fr 1fr; }
            .filter-item:last-child { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <aside class="sidebar">
        <div class="brand">
            <img src="" id="sidebarLogo" alt="">
            <div><h1 style="font-weight: 800; font-size: 1rem;"><span class="text-pu">PU</span> <span class="text-sda">SDA</span></h1><p style="font-size: 0.55rem; opacity: 0.6;">WS BONDOYUDO BARU</p></div>
        </div>
        <nav>
            <a href="index_pusda.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="raport.html" class="nav-link"><i data-lucide="file-bar-chart"></i> E-Raport</a>
            <a href="presensi.html" class="nav-link"><i data-lucide="fingerprint"></i> E-Presensi</a>
            <a href="#" class="nav-link active"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>
        <div style="margin-top: auto; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 20px; text-align: center;">
            <p style="font-size: 0.6rem; opacity: 0.4; text-transform: uppercase;">Waktu Server</p>
            <h2 id="liveClock" style="font-family: 'JetBrains Mono'; font-size: 1.8rem; color: var(--sda-toska);">00:00</h2>
        </div>
    </aside>

    <main class="main-content">
        <div class="dashboard-container">
            
            <div class="section-header">
                <h1>Statistik & Koordinator</h1>
                <div class="live-status">
                    <div class="dot"></div>
                    Live Update (30s)
                </div>
            </div>
            
            <div id="korlapGrid" class="summary-grid"></div>

            <div class="monitoring-box">
                <div class="filter-canvas">
                    <div class="filter-item"><label>Pilih Tanggal</label><input type="date" id="fDate" onchange="onDateChange()"></div>
                    <div class="filter-item"><label>Wilayah WS</label><select id="fWil" onchange="filterData()"><option value="ALL">Semua</option></select></div>
                    <div class="filter-item"><label>Nama Personel</label><input type="text" id="fSearch" placeholder="Ketik nama..." oninput="onSearchInput()"></div>
                </div>

                <div style="display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; width: fit-content; border: 1px solid var(--glass-border);">
                    <button id="btnG" onclick="toggleV('grid')" style="padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 0.7rem; background: var(--accent); color: white;">Kotak</button>
                    <button id="btnT" onclick="toggleV('table')" style="padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 0.7rem; background: transparent; color: rgba(255,255,255,0.4);">Tabel</button>
                </div>

                <div id="gridView" class="monitoring-grid"></div>
                
                <div id="tableWrapper" class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th style="min-width: 250px;">Nama Petugas</th>
                                <th>Wilayah</th>
                                <th>Masuk</th>
                                <th style="text-align:center">Data Masuk (S/K/G)</th>
                                <th>Pulang</th>
                                <th style="text-align:center">Data Pulang (S/K/G)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="pModal" class="modal">
        <div class="modal-content">
            <button onclick="closeM()" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10;"><i data-lucide="x"></i></button>
            <div id="mImgWrap" style="width: 100%; aspect-ratio: 3/4; background: #000; display: flex; align-items: center; justify-content: center;"><img id="mImg" src="" style="width: 100%; height: 100%; object-fit: contain;"></div>
            <div style="padding: 25px; text-align: center;">
                <h3 id="mName" style="color:var(--sda-toska);">...</h3>
                <p id="mInfo" style="font-size:0.75rem; font-weight:800; opacity:0.5; margin-top:5px;"></p>
                <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:18px; border:1px solid var(--glass-border); margin-top:15px;">
                    <span style="font-size:0.6rem; opacity:0.4; font-weight:800;">WAKTU ABSEN</span>
                    <h2 id="mTime" style="font-family:'JetBrains Mono'; font-size:1.4rem;">00:00</h2>
                </div>
                <button id="mLocBtn" style="background: var(--pu-blue); color: white; border: none; padding: 16px; border-radius: 20px; width: 100%; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;"><i data-lucide="navigation"></i> BUKA GOOGLE MAPS</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzQIExXFgyE2tJM5si70CaLGBYWRvYBdqI9DJeF-GXzSoZiuw3ASs7tmGx7_TzHMUMy/exec";
        let dbE = [], dbP = [], dbK = [], searchTimeout = null;

        window.onload = () => {
            lucide.createIcons();
            const now = new Date();
            document.getElementById('fDate').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            
            init();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}); }, 1000);
            setInterval(() => { init(true); }, 30000);
        };

        async function init(isRefresh = false) {
            try {
                const r = await fetch(API + "?action=getDashboardData");
                const d = await r.json();
                dbE = d.pegawai || [];
                dbK = d.korlap || [];
                if(d.config?.Logo) document.getElementById('sidebarLogo').src = d.config.Logo;
                if(!isRefresh) {
                    const sel = document.getElementById('fWil');
                    [...new Set(dbE.map(p => p.Wilayah).filter(w => w))].forEach(w => sel.innerHTML += `<option value="${w}">${w}</option>`);
                }
                const rp = await fetch(API + "?action=getPresensiAdminData");
                const dp = await rp.json();
                dbP = dp.data || [];
                
                updateKorlapStats();
                filterData();
            } catch (e) { console.error(e); }
        }

        // OPTIMASI: Hitung statistik Korlap hanya saat tanggal berubah atau load awal
        function updateKorlapStats() {
            const date = document.getElementById('fDate').value;
            const kg = document.getElementById('korlapGrid');
            kg.innerHTML = dbK.map(k => {
                const wilStaff = dbE.filter(p => p.Wilayah === k.Wilayah);
                let h=0, p=0, s=0;
                wilStaff.forEach(stf => {
                    const logs = dbP.filter(l => {
                        const lTs = l.Timestamp || l.timestamp;
                        const lDate = new Date(lTs).toISOString().split('T')[0];
                        return lDate === date && String(l['ID Pegawai'] || l.id_pegawai || l.ID) === String(stf.ID);
                    });
                    if (logs.some(l => ['hadir','terlambat'].includes(l.Status.toLowerCase()))) h++;
                    if (logs.some(l => l.Status.toLowerCase() === 'pulang')) p++;
                    if (logs.some(l => ['izin','sakit','dinas'].includes(l.Status.toLowerCase()))) s++;
                });
                return `
                    <div class="korlap-card">
                        <div class="korlap-profile-part">
                            <div class="korlap-foto"><img src="${k.Link_Foto_Profile}" onerror="this.src='https://via.placeholder.com/60x90'"></div>
                            <div class="korlap-info"><h2>${k.Nama}</h2><p>Korlap ${k.Wilayah}</p></div>
                        </div>
                        <div class="korlap-stats-part">
                            <div class="k-stat-item"><b>${wilStaff.length}</b><span>Total</span></div>
                            <div class="k-stat-item"><b style="color:var(--success)">${h}</b><span>Hadir</span></div>
                            <div class="k-stat-item"><b style="color:var(--accent)">${p}</b><span>Pulang</span></div>
                            <div class="k-stat-item"><b style="color:#a855f7">${s}</b><span>SID</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function onDateChange() {
            updateKorlapStats();
            filterData();
        }

        function onSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterData, 300); // Debounce 300ms agar lancar saat mengetik
        }

        function filterData() {
            const date = document.getElementById('fDate').value;
            const wil = document.getElementById('fWil').value;
            const search = document.getElementById('fSearch').value.toLowerCase();
            const map = {};

            // Filter pegawai berdasarkan Wilayah & Search
            dbE.forEach(p => {
                if ((wil === 'ALL' || p.Wilayah === wil) && (!search || p.Nama.toLowerCase().includes(search))) {
                    map[p.ID] = { id: p.ID, nama: p.Nama, wil: p.Wilayah, foto: p.Link_Foto_Profile, in: "-", out: "-", sin: null, kin: null, gin: null, sout: null, kout: null, gout: null };
                }
            });

            // Isi data presensi ke dalam map pegawai yang sudah difilter
            dbP.forEach(log => {
                const lTs = log.Timestamp || log.timestamp;
                const lDate = new Date(lTs).toISOString().split('T')[0];
                const pID = String(log['ID Pegawai'] || log.id_pegawai || log.ID);
                if (lDate === date && map[pID]) {
                    const st = (log.Status || "").toLowerCase();
                    const jam = new Date(lTs).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                    if (st.includes('hadir') || st.includes('terlambat')) {
                        map[pID].in = jam; map[pID].sin = log['Foto Selfie'] || log.foto_selfie; map[pID].kin = log['Foto Lokasi'] || log.foto_lokasi || log.foto_kerja; map[pID].gin = log.GPS || log.gps;
                    } else if (st.includes('pulang')) {
                        map[pID].out = jam; map[pID].sout = log['Foto Selfie'] || log.foto_selfie; map[pID].kout = log['Foto Lokasi'] || log.foto_lokasi || log.foto_kerja; map[pID].gout = log.GPS || log.gps;
                    }
                }
            });

            const dataArr = Object.values(map);
            renderGrid(dataArr);
            renderTable(dataArr);
            lucide.createIcons();
        }

        function renderGrid(data) {
            const container = document.getElementById('gridView');
            if (container.style.display === 'none') return;
            container.innerHTML = data.length ? "" : '<p style="text-align:center; width:100%; padding:40px; opacity:0.3;">Personel tidak ditemukan.</p>';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = 'personel-card';
                card.innerHTML = `
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div class="korlap-foto" style="width:50px; height:75px;"><img src="${p.foto}" onerror="this.src='https://via.placeholder.com/50x75'"></div>
                        <div><h3 style="color:white; font-weight:800; font-size:1rem;">${p.nama}</h3><p style="font-size:0.7rem; opacity:0.5; font-weight:800;">${p.wil}</p></div>
                    </div>
                    <div class="p-actions-grid">
                        <div class="pres-box" style="border-top: 3px solid var(--success);">
                            <div style="display:flex; justify-content:space-between;"><span style="font-size:0.5rem; opacity:0.5;">HADIR</span><span style="font-family:'JetBrains Mono'; font-weight:800; color:var(--success)">${p.in}</span></div>
                            <div class="thumb-group-v2">
                                <div class="mini-thumb-v2" onclick="openP('${p.sin}','${p.nama}','SELFIE HADIR','${p.in}','${p.gin}')">${p.sin?`<img src="${p.sin}">`:`<i data-lucide="camera" size="14"></i>`}</div>
                                <div class="mini-thumb-v2" onclick="openP('${p.kin}','${p.nama}','KERJA HADIR','${p.in}','${p.gin}')">${p.kin?`<img src="${p.kin}">`:`<i data-lucide="image" size="14"></i>`}</div>
                            </div>
                            <div class="btn-loc-wide ${!p.gin?'disabled':''}" onclick="openP(null,'${p.nama}','LOKASI HADIR','${p.in}','${p.gin}')"><i data-lucide="map-pin" size="12"></i> GPS Pagi</div>
                        </div>
                        <div class="pres-box" style="border-top: 3px solid var(--accent);">
                            <div style="display:flex; justify-content:space-between;"><span style="font-size:0.5rem; opacity:0.5;">PULANG</span><span style="font-family:'JetBrains Mono'; font-weight:800; color:var(--accent)">${p.out}</span></div>
                            <div class="thumb-group-v2">
                                <div class="mini-thumb-v2" onclick="openP('${p.sout}','${p.nama}','SELFIE PULANG','${p.out}','${p.gout}')">${p.sout?`<img src="${p.sout}">`:`<i data-lucide="camera" size="14"></i>`}</div>
                                <div class="mini-thumb-v2" onclick="openP('${p.kout}','${p.nama}','KERJA PULANG','${p.out}','${p.gout}')">${p.kout?`<img src="${p.kout}">`:`<i data-lucide="image" size="14"></i>`}</div>
                            </div>
                            <div class="btn-loc-wide ${!p.gout?'disabled':''}" style="color:var(--accent); background:rgba(249,115,22,0.1);" onclick="openP(null,'${p.nama}','LOKASI PULANG','${p.out}','${p.gout}')"><i data-lucide="map-pin" size="12"></i> GPS Sore</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            if (document.getElementById('tableWrapper').style.display === 'none') return;
            body.innerHTML = "";
            data.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:700; text-transform: uppercase;">${p.nama}</td>
                    <td style="opacity:0.6;">${p.wil}</td>
                    <td style="font-family:'JetBrains Mono'; font-weight:800; color:${p.in!=='-'?'var(--success)':'#334155'}">${p.in}</td>
                    <td><div class="group-icons">
                        <div class="i-btn ${p.sin?'active-h':''}" onclick="openP('${p.sin}','${p.nama}','Selfie Hadir','${p.in}','${p.gin}')"><i data-lucide="camera" size="16"></i></div>
                        <div class="i-btn ${p.kin?'active-h':''}" onclick="openP('${p.kin}','${p.nama}','Kerja Hadir','${p.in}','${p.gin}')"><i data-lucide="briefcase" size="16"></i></div>
                        <div class="i-btn ${p.gin?'active-h':''}" onclick="openP(null,'${p.nama}','Lokasi Hadir','${p.in}','${p.gin}')"><i data-lucide="map-pin" size="16"></i></div>
                    </div></td>
                    <td style="font-family:'JetBrains Mono'; font-weight:800; color:${p.out!=='-'?'var(--accent)':'#334155'}">${p.out}</td>
                    <td><div class="group-icons">
                        <div class="i-btn ${p.sout?'active-p':''}" onclick="openP('${p.sout}','${p.nama}','Selfie Pulang','${p.out}','${p.gout}')"><i data-lucide="camera" size="16"></i></div>
                        <div class="i-btn ${p.kout?'active-p':''}" onclick="openP('${p.kout}','${p.nama}','Kerja Pulang','${p.out}','${p.gout}')"><i data-lucide="briefcase" size="16"></i></div>
                        <div class="i-btn ${p.gout?'active-p':''}" onclick="openP(null,'${p.nama}','Lokasi Pulang','${p.out}','${p.gout}')"><i data-lucide="map-pin" size="16"></i></div>
                    </div></td>
                `;
                body.appendChild(row);
            });
        }

        function openP(url, name, info, time, gps) {
            if (time === "-" && !url && !gps) return;
            const m = document.getElementById('pModal');
            const img = document.getElementById('mImg');
            if(url && url !== '-' && url !== 'null') {
                img.src = url; document.getElementById('mImgWrap').style.display = 'flex';
            } else { document.getElementById('mImgWrap').style.display = 'none'; }
            document.getElementById('mName').innerText = name;
            document.getElementById('mInfo').innerText = info;
            document.getElementById('mTime').innerText = time;
            const btn = document.getElementById('mLocBtn');
            if(gps && gps !== '-') {
                btn.style.display = 'flex';
                btn.onclick = () => window.open(`https://www.google.com/maps?q=${gps.replace(/\s/g, '')}`, '_blank');
            } else { btn.style.display = 'none'; }
            m.style.display = 'flex';
        }

        function toggleV(v) {
            document.getElementById('btnG').style.background = v==='grid' ? 'var(--accent)' : 'transparent';
            document.getElementById('btnG').style.color = v==='grid' ? 'white' : 'rgba(255,255,255,0.4)';
            document.getElementById('btnT').style.background = v==='table' ? 'var(--accent)' : 'transparent';
            document.getElementById('btnT').style.color = v==='table' ? 'white' : 'rgba(255,255,255,0.4)';
            document.getElementById('gridView').style.display = v==='grid' ? 'grid' : 'none';
            document.getElementById('tableWrapper').style.display = v==='table' ? 'block' : 'none';
            filterData(); // Render ulang sesuai view terpilih
        }

        function closeM() { document.getElementById('pModal').style.display = 'none'; }
    </script>
</body>
</html>
