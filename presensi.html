<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Presensi Digital - UPT PUSDA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af">
    
    <!-- Ikon & Peta -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e40af; 
            --bg-dark: #0d1b3e; 
            --glass: rgba(15, 32, 77, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #f97316;
            --success: #10b981;
            --danger: #ef4444;
            --pu-blue: #3b82f6;
            --sda-toska: #2dd4bf;
            --sidebar-width: 280px;
        }

        /* --- Dasar & Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; min-height: 100vh; background: var(--bg-dark); overflow-x: hidden; color: #f8fafc; }
        body { display: flex; position: relative; width: 100vw; justify-content: center; }
        
        .fixed-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at top right, #1e40af, #0d1b3e 85%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.3), transparent 70%); 
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 32, 77, 0.9); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .brand img { height: 42px; border-radius: 8px; object-fit: contain; }
        .nav-link { padding: 14px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.3s; margin-bottom: 5px; font-weight: 600; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: linear-gradient(135deg, var(--pu-blue), var(--primary)); color: white; box-shadow: 0 10px 20px rgba(30, 64, 175, 0.4); }
        .sidebar-clock { margin-top: auto; padding: 20px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 20px; text-align: center; }
        .sidebar-clock h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; color: var(--sda-toska); }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 40px 60px 120px 60px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1200px; transition: 0.3s; }

        /* --- STEP 1: SELECTOR --- */
        #stepSelector { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .photo-hero-wrap { 
            position: relative; z-index: 1; width: 260px; aspect-ratio: 2/3; 
            display: flex; justify-content: center; background: transparent; 
            transition: 0.4s ease;
        }
        .photo-hero-wrap img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: drop-shadow(0 20px 45px rgba(0,0,0,0.9)); 
            transition: opacity 0.3s ease;
        }
        .photo-hero-wrap.loading img { opacity: 0.3; }

        .unified-card { 
            background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); 
            border-radius: 50px; padding: 60px 40px 45px 40px; width: 100%; max-width: 850px; 
            margin-top: -46px; position: relative; z-index: 2; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 25px; align-items: center;
        }
        
        .name-scroller-box { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .name-scroller-box h2 { font-size: clamp(1.3rem, 4vw, 2.5rem); font-weight: 800; text-transform: uppercase; letter-spacing: -1px; text-align: center; line-height: 1.1; flex: 1; color: white; }
        .btn-circle-nav { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: white; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-circle-nav:hover { background: var(--accent); transform: scale(1.1); }

        .search-area-unified { position: relative; width: 100%; max-width: 650px; display: flex; align-items: center; }
        .search-area-unified input { width: 100%; padding: 20px 75px 20px 30px; background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 40px; color: white; outline: none; font-size: 1.1rem; }
        
        .mic-trigger { position: absolute; right: 12px; background: none; border: none; color: var(--sda-toska); cursor: pointer; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .mic-trigger.recording { color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .mic-trigger.recording::after { content: ''; position: absolute; inset: 0; border: 2px solid var(--danger); border-radius: 50%; animation: ripple 1.2s infinite; }
        @keyframes ripple { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .chips-list-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .chip-pill { padding: 12px 25px; border-radius: 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); cursor: pointer; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.5); }
        .chip-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

        .btn-orange-action { width: 100%; max-width: 650px; padding: 25px; border: none; border-radius: 40px; background: linear-gradient(135deg, #f97316, #ea580c); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 15px 35px rgba(249, 115, 22, 0.4); text-transform: uppercase; }

        /* --- STEP 2: FORM --- */
        #stepForm { display: none; width: 100%; flex-direction: column; align-items: center; position: relative; }
        .form-unified-box { background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 50px; padding: 40px 30px; width: 100%; max-width: 850px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 18px; }
        .profile-id-strip { display: flex; align-items: center; gap: 15px; padding: 12px 20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--glass-border); }
        .mini-foto { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--sda-toska); background: radial-gradient(circle at center, #2e446e, #050a18); }
        .map-view-frame { width: 100%; height: 220px; border-radius: 30px; overflow: hidden; border: 1.5px solid var(--glass-border); }
        .gps-status-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid var(--sda-toska); font-size: 0.85rem; font-weight: 700; }
        .gps-glow { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse-gps 1.5s infinite; margin-right: 10px; }

        .presence-main-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-presence-mega { padding: 25px 15px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 800; color: rgba(255,255,255,0.4); transition: 0.3s; }
        .presence-sub-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-presence-pill { padding: 15px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); text-align: center; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.4); }

        .btn-hadir.active { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        .btn-pulang.active { background: rgba(59, 130, 246, 0.2); border-color: var(--pu-blue); color: var(--pu-blue); }
        .btn-izin.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #a855f7; }
        .btn-sakit.active { background: rgba(234, 179, 8, 0.2); border-color: #eab308; color: #eab308; }
        .btn-dinas.active { background: rgba(249, 115, 22, 0.2); border-color: #f97316; color: #f97316; }

        .status-info-note { font-size: 0.85rem; font-weight: 800; text-align: center; padding: 15px; border-radius: 20px; background: rgba(0,0,0,0.3); color: var(--sda-toska); border-left: 5px solid var(--sda-toska); display: none; }
        .textarea-container { position: relative; width: 100%; display: flex; align-items: center; }
        textarea { width: 100%; background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px 65px 25px 25px; color: white; outline: none; resize: none; font-size: 1rem; line-height: 1.6; min-height: 130px; }
        
        .cam-grid-5050 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .cam-slot-frame { aspect-ratio: 1/1; border-radius: 24px; background: rgba(0,0,0,0.5); border: 2px dashed var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .cam-slot-frame img { width: 100%; height: 100%; object-fit: cover; }

        .btn-submit-final { width: 100%; padding: 22px; border-radius: 35px; border: none; font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, var(--success), #059669); color: white; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4); }

        #sendingOverlay { position: fixed; inset: 0; z-index: 100000; background: rgba(13, 27, 62, 0.95); backdrop-filter: blur(25px); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; width: 100vw; height: 100vh; }
        .sending-spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.1); border-top-color: var(--sda-toska); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toastContainer { position: fixed; top: 30px; right: 30px; z-index: 100005; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 18px 30px; border-radius: 15px; background: #0b1120; border-left: 5px solid var(--sda-toska); color: white; font-weight: 800; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; }

        #cameraUI { display: none; position: fixed; inset: 0; z-index: 10000; background: #000; }
        #vStream { width: 100%; height: 100%; object-fit: cover; }
        .shutter { width: 85px; height: 85px; border: 6px solid white; border-radius: 50%; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: transparent; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 15px 15px 140px 15px; width: 100%; }
            .photo-hero-wrap { width: 220px; }
            .unified-card, .form-unified-box { border-radius: 40px; padding: 45px 15px 30px 15px; }
            .bottom-nav { display: flex !important; position: fixed; bottom: 20px; left: 15px; right: 15px; height: 72px; background: #0f172a; border: 1px solid var(--glass-border); border-radius: 35px; z-index: 1000; justify-content: space-around; align-items: center; }
            .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.6rem; font-weight: 700; width: 55px; }
            .b-nav-item.active { color: var(--sda-toska); }
            .b-nav-fab { width: 62px; height: 62px; background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -55px; border: 4px solid #050a18; color: white; }
        }
    </style>
</head>

    <div id="cameraUI"><video id="vStream" autoplay playsinline muted></video><button class="shutter" id="shutterBtn"></button><button onclick="stopCam()" style="position:absolute; top:25px; right:25px; color:white; background:rgba(0,0,0,0.5); width:50px; height:50px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center;"><i data-lucide="x"></i></button></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzQIExXFgyE2tJM5si70CaLGBYWRvYBdqI9DJeF-GXzSoZiuw3ASs7tmGx7_TzHMUMy/exec";
        let dbE = [], dbF = [], uIdx = 0, map, marker, uPos = {lat:0, lng:0}, cType = '', sB64 = null, kB64 = null, selectedStatus = 'HADIR';
        let searchTimeout = null, photoCache = {};

        window.onload = () => {
            lucide.createIcons();
            initMap();
            loadData();
            setInterval(() => { 
                document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}); 
            }, 1000);
            
            document.getElementById('shutterBtn').onclick = () => {
                const video = document.getElementById('vStream');
                if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
                    capturePhoto();
                } else {
                    showToast("Sensor sedang menyesuaikan...", "error");
                }
            };
        };

        function showToast(txt, type="success") {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            if(type === "error") t.style.borderLeftColor = "var(--danger)";
            t.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'alert-circle'}"></i> ${txt}`;
            container.appendChild(t);
            lucide.createIcons();
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        async function loadData() {
            setLoading(true, "Sinkronisasi...");
            try {
                const r = await fetch(API + "?action=getDashboardData");
                const d = await r.json();
                dbE = d.pegawai || [];
                dbF = [...dbE];
                if(d.config?.Logo) document.getElementById('sidebarLogo').src = d.config.Logo;
                renderChips();
                upUI();
                preloadAllPhotos(); // DIAM-DIAM DOWNLOAD FOTO
            } catch (e) { showToast("Gagal memuat data", "error"); }
            setLoading(false);
        }

        // OPTIMASI: Google Proxy Resizer & Preloading
        function getSmartUrl(url) {
            if(!url || !url.includes('googleusercontent.com')) return url;
            // Gunakan parameter =s500 agar Google Drive mengirim versi kompresi yang ringan
            return url.split('=')[0] + '=s500';
        }

        function preloadAllPhotos() {
            dbE.forEach(p => {
                const imgUrl = getSmartUrl(p.Link_Foto_Profile);
                if(imgUrl) {
                    const i = new Image();
                    i.src = imgUrl;
                    photoCache[p.ID] = i;
                }
            });
        }

        function renderChips() {
            const wils = ["ALL", ...new Set(dbE.map(p => p.Wilayah).filter(w => w))];
            document.getElementById('wilChips').innerHTML = wils.map(w => `<div class="chip-pill ${w==='ALL'?'active':''}" onclick="filterWil('${w}', this)">${w}</div>`).join('');
        }

        function filterWil(w, el) {
            document.querySelectorAll('.chip-pill').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            dbF = w === 'ALL' ? [...dbE] : dbE.filter(p => p.Wilayah === w);
            uIdx = 0; upUI();
        }

        function upUI() {
            if(!dbF.length) return;
            const p = dbF[uIdx];
            const wrap = document.getElementById('pWrap');
            const img = document.getElementById('pImg');
            
            wrap.classList.add('loading'); // Efek fade out sebentar
            
            const optimizedUrl = getSmartUrl(p.Link_Foto_Profile);
            img.src = optimizedUrl || "https://via.placeholder.com/300x450?text=PNG";
            
            img.onload = () => wrap.classList.remove('loading'); // Fade in saat siap

            document.getElementById('pName').innerText = p.Nama;
            document.getElementById('pJob').innerText = p.Jabatan || "STAFF";
            document.getElementById('pWil').innerText = "WILAYAH: " + (p.Wilayah || "UPT");
            
            document.getElementById('formMiniFoto').src = optimizedUrl || "https://via.placeholder.com/100";
            document.getElementById('formName').innerText = p.Nama;
            document.getElementById('formWilayah').innerText = p.Wilayah || "WS Bondoyudo Baru";
        }

        function navU(d) { uIdx = (uIdx + d + dbF.length) % dbF.length; upUI(); }

        function onSearchInput(val) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                dbF = dbE.filter(p => p.Nama.toLowerCase().includes(val.toLowerCase())); 
                uIdx = 0; 
                upUI();
            }, 300); // Debounce agar mengetik lancar
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-8.13, 113.22], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([-8.13, 113.22]).addTo(map);
        }

        function upLoc() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    uPos = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                    document.getElementById('gpsTxt').innerText = `Lokasi: ${uPos.lat.toFixed(5)}, ${uPos.lng.toFixed(5)}`;
                    map.setView([uPos.lat, uPos.lng], 16);
                    marker.setLatLng([uPos.lat, uPos.lng]);
                    setTimeout(() => map.invalidateSize(), 400);
                }, () => showToast("Aktifkan GPS HP!", "error"), {enableHighAccuracy: true});
            }
        }

        function openForm() {
            document.getElementById('stepSelector').style.display = 'none';
            document.getElementById('stepForm').style.display = 'flex';
            setTimeout(() => { map.invalidateSize(); upLoc(); }, 300);
        }

        function closeForm() {
            document.getElementById('stepSelector').style.display = 'flex';
            document.getElementById('stepForm').style.display = 'none';
        }

        function setS(el, st) {
            document.querySelectorAll('.btn-presence-mega, .btn-presence-pill').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            selectedStatus = st;
            const info = document.getElementById('statusInfo');
            info.style.display = 'block';
            const now = new Date(), hour = now.getHours(), min = now.getMinutes(), timeVal = (hour * 100) + min;

            if(st === 'HADIR') {
                if(timeVal <= 740) { info.innerText = "Hadir Tepat Waktu (Skor 50)"; info.style.color = "var(--success)"; info.style.borderLeftColor = "var(--success)"; }
                else if(timeVal <= 800) { info.innerText = "Status: Terlambat (Skor 40)"; info.style.color = "var(--accent)"; info.style.borderLeftColor = "var(--accent)"; }
                else { info.innerText = "Status: Sangat Terlambat (Skor 25)"; info.style.color = "var(--danger)"; info.style.borderLeftColor = "var(--danger)"; }
            } else if(st === 'PULANG') {
                if(hour < 10) { info.innerText = "Sistem Pulang Belum Terbuka (Minimal 10:00)"; info.style.color = "var(--danger)"; info.style.borderLeftColor = "var(--danger)"; }
                else { info.innerText = "Terimakasih Atas Kerjanya, Hati-hati di jalan (Skor 50)"; info.style.color = "var(--pu-blue)"; info.style.borderLeftColor = "var(--pu-blue)"; }
            } else { info.innerText = `Status ${st} Terpilih. Lampirkan dokumen pendukung.`; info.style.color = "#a855f7"; info.style.borderLeftColor = "#a855f7"; }
        }

        async function triggerCam(type) {
            cType = type;
            const ui = document.getElementById('cameraUI');
            ui.style.display = 'flex';
            const constraints = { video: { facingMode: type === 'selfie' ? "user" : "environment", width: { ideal: 1280 }, height: { ideal: 720 } } };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('vStream').srcObject = stream;
            } catch (err) { ui.style.display = 'none'; showToast("Izin Kamera Ditolak!", "error"); }
        }

        function capturePhoto() {
            const v = document.getElementById('vStream'), c = document.createElement('canvas');
            c.width = 720; c.height = 960;
            const ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0, c.width, c.height);
            
            const grad = ctx.createLinearGradient(0, 750, 0, 960);
            grad.addColorStop(0, "rgba(13, 27, 62, 0)"); grad.addColorStop(0.3, "rgba(13, 27, 62, 0.9)"); grad.addColorStop(1, "rgba(13, 27, 62, 1)");
            ctx.fillStyle = grad; ctx.fillRect(0, 750, 720, 210);
            ctx.fillStyle = "var(--sda-toska)"; ctx.fillRect(35, 820, 6, 110);
            ctx.fillStyle = "white"; ctx.font = "bold 42px 'Plus Jakarta Sans'";
            ctx.fillText(document.getElementById('pName').innerText.toUpperCase(), 55, 865);
            ctx.fillStyle = "var(--sda-toska)"; ctx.font = "800 24px 'JetBrains Mono'";
            ctx.fillText(new Date().toLocaleString('id-ID'), 55, 905);
            ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "16px sans-serif";
            ctx.fillText(`KOORDINAT: ${uPos.lat.toFixed(6)}, ${uPos.lng.toFixed(6)} | DIGITAL VERIFIED`, 55, 935);
            
            const data = c.toDataURL('image/jpeg', 0.8);
            if(cType === 'selfie') { sB64 = data; document.getElementById('sImg').src = data; document.getElementById('sImg').style.display='block'; document.getElementById('sPh').style.display='none'; }
            else { kB64 = data; document.getElementById('kImg').src = data; document.getElementById('kImg').style.display='block'; document.getElementById('kPh').style.display='none'; }
            stopCam();
        }

        function stopCam() {
            const v = document.getElementById('vStream');
            if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
            document.getElementById('cameraUI').style.display = 'none';
        }

        async function subD() {
            const n = document.getElementById('notes').value.trim();
            if(!n) return showToast("Harap isi Ringkasan Tugas!", "error");
            if(!sB64 || !kB64) return showToast("Lengkapi Foto Selfie & Kerja!", "error");
            
            setLoading(true, "Mengirim Data...");
            const p = dbF[uIdx];
            const payload = { action: 'presensi', idPegawai: p.ID, nama: p.Nama, status: selectedStatus, selfie: sB64, workPhoto: kB64, keterangan: n, gps: `${uPos.lat},${uPos.lng}`, wilayah: p.Wilayah || "-" };

            try {
                const r = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                const res = await r.json();
                setLoading(false);
                if(res.status === 'success') { showToast(res.message); setTimeout(() => window.location.reload(), 1500); }
                else { showToast(res.message, "error"); }
            } catch (e) { setLoading(false); showToast("Data Terkirim.", "success"); setTimeout(() => window.location.reload(), 1500); }
        }

        function startMic(tid) {
            const S = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!S) return showToast("Mic tidak didukung", "error");
            const r = new S(); r.lang = 'id-ID';
            const btn = (tid === 'search') ? document.getElementById('micSearch') : document.getElementById('micNote');
            r.onstart = () => btn.classList.add('recording');
            r.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                if(tid === 'search') { document.getElementById('searchInput').value = txt; onSearchInput(txt); }
                else { document.getElementById('notes').value += txt; }
            };
            r.onend = () => btn.classList.remove('recording');
            r.start();
        }

        function setLoading(s, text) { document.getElementById('overlayText').innerText = text; document.getElementById('sendingOverlay').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
