<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Presensi Digital - UPT PUSDA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af">
    
    <!-- Ikon & Peta -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e40af; 
            --bg-dark: #0d1b3e; 
            --glass: rgba(15, 32, 77, 0.9); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #f97316;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #facc15;
            --pu-blue: #3b82f6;
            --sda-toska: #2dd4bf;
            --sidebar-width: 280px;
        }

        /* --- Dasar & Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; min-height: 100vh; background: var(--bg-dark); overflow-x: hidden; color: #f8fafc; }
        body { display: flex; position: relative; width: 100vw; justify-content: center; transition: background 1s ease; }
        
        .fixed-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top right, var(--primary), var(--bg-dark) 85%); }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 32, 77, 0.96); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .brand img { height: 40px; border-radius: 5px; }
        
        .nav-items { display: flex; flex-direction: column; gap: 8px; }
        .nav-link { 
            display: flex !important; align-items: center !important; gap: 14px !important; 
            padding: 14px 18px !important; border-radius: 16px; color: rgba(255,255,255,0.6); 
            text-decoration: none; transition: 0.3s; font-weight: 600; 
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: linear-gradient(135deg, var(--pu-blue), var(--primary)); color: white; box-shadow: 0 10px 20px rgba(30, 64, 175, 0.4); }
        .sidebar-clock { margin-top: auto; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 20px; text-align: center; }
        .sidebar-clock h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; color: var(--sda-toska); }

        /* --- MAIN CONTENT (Optimal Fluid Gap) --- */
        .main-content { 
            flex: 1; margin-left: var(--sidebar-width); 
            padding: clamp(20px, 5vw, 40px) clamp(20px, 8vw, 60px); 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; width: calc(100% - var(--sidebar-width)); 
        }

        /* --- STEP CONTAINER --- */
        .step-container { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero Image - Step 1 */
        .photo-hero-wrap { position: relative; z-index: 1; width: 100%; max-width: 220px; aspect-ratio: 2/3; display: flex; justify-content: center; margin-bottom: -15px; transition: 0.4s ease; }
        .photo-hero-wrap img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9)); transition: opacity 0.3s; }
        .photo-hero-wrap.loading img { opacity: 0.3; }

        .unified-card { 
            background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); 
            border-radius: 45px; padding: clamp(30px, 5vw, 50px) clamp(20px, 4vw, 40px); width: 100%; 
            position: relative; z-index: 2; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }

        .name-scroller-box { display: flex !important; align-items: center !important; justify-content: center !important; gap: clamp(10px, 3vw, 20px); width: 100%; }
        .name-scroller-box h2 { font-size: clamp(1.1rem, 3.5vw, 2.3rem); font-weight: 800; text-transform: uppercase; letter-spacing: -1px; text-align: center; color: white; flex: 1; line-height: 1.1; }
        .btn-circle-nav { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .btn-circle-nav:active { background: var(--accent); transform: scale(0.9); }

        .search-area-unified { position: relative; width: 100%; max-width: 600px; }
        .search-area-unified input { width: 100%; padding: 18px 65px 18px 25px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 40px; color: white; outline: none; font-size: 1rem; }
        .mic-trigger { position: absolute !important; right: 8px !important; top: 50% !important; transform: translateY(-50%) !important; background: none; border: none; color: var(--sda-toska); cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 50%; }
        .mic-trigger.recording { color: var(--danger); background: rgba(239, 68, 68, 0.1); box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.05); }

        .chips-list-row { display: flex !important; flex-wrap: wrap !important; gap: 8px !important; justify-content: center !important; width: 100%; }
        .chip-pill { padding: 10px 18px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); cursor: pointer; font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.4); }
        .chip-pill.active { background: var(--accent) !important; border-color: var(--accent) !important; color: white !important; }

        .btn-orange-action { width: 100%; max-width: 600px; padding: 22px; border: none; border-radius: 40px; background: linear-gradient(135deg, #f97316, #ea580c); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 15px 35px rgba(249, 115, 22, 0.4); text-transform: uppercase; margin-top: 10px; }

        /* --- STEP 2: FORM (Disesuaikan coretan image_35c85d) --- */
        .form-header-compact { display: flex; align-items: flex-end; gap: 20px; width: 100%; margin-bottom: 5px; position: relative; }
        .photo-pop-out { width: 100px; height: 140px; border-radius: 20px; overflow: visible; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: center; }
        .photo-pop-out img { width: 140%; height: auto; max-height: 180px; object-fit: contain; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); margin-bottom: -10px; }
        
        .name-info-compact { padding-bottom: 15px; }
        .name-info-compact h3 { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; color: white; }
        .name-info-compact p { font-size: 0.8rem; opacity: 0.6; font-weight: 700; margin-top: 5px; color: var(--sda-toska); }

        .form-unified-box { background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 30px 25px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 15px; }
        
        .map-view-frame { width: 100%; height: 180px; border-radius: 25px; overflow: hidden; border: 1.5px solid var(--glass-border); background: #000; }
        .gps-status-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid var(--sda-toska); font-size: 0.85rem; font-weight: 700; }
        .gps-glow { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse-gps 1.5s infinite; margin-right: 10px; }
        @keyframes pulse-gps { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } }

        .presence-main-controls { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; width: 100%; }
        .btn-presence-mega { padding: 20px 10px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; font-weight: 800; color: rgba(255,255,255,0.4); }
        .btn-hadir.active { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--success) !important; color: var(--success) !important; }
        .btn-pulang.active { background: rgba(59, 130, 246, 0.2) !important; border-color: var(--pu-blue) !important; color: var(--pu-blue) !important; }

        .presence-sub-row { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; width: 100%; }
        .btn-presence-pill { padding: 15px 5px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); text-align: center; cursor: pointer; color: rgba(255,255,255,0.4); }
        .btn-presence-pill.active { border-color: var(--sda-toska) !important; color: var(--sda-toska) !important; background: rgba(45, 212, 191, 0.15) !important; }

        .status-info-note { font-size: 0.8rem; font-weight: 800; text-align: center; padding: 15px; border-radius: 18px; background: rgba(0,0,0,0.3); color: var(--sda-toska); border-left: 6px solid var(--sda-toska); display: none; line-height: 1.4; }
        
        .textarea-container { position: relative; width: 100%; }
        textarea { width: 100%; background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px 55px 15px 20px; color: white; outline: none; resize: none; font-size: 0.95rem; min-height: 100px; }

        .cam-grid-5050 { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; width: 100%; }
        .cam-slot-frame { aspect-ratio: 1/1; border-radius: 20px; background: rgba(0,0,0,0.5); border: 2px dashed var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .cam-slot-frame img { width: 100%; height: 100%; object-fit: cover; }

        .btn-submit-final { width: 100%; padding: 22px; border-radius: 35px; border: none; font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, var(--success), #059669) !important; color: white !important; cursor: pointer; text-transform: uppercase; box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- LOADING OVERLAY --- */
        #sendingOverlay { position: fixed; inset: 0; z-index: 100000; background: rgba(13, 27, 62, 0.98); backdrop-filter: blur(25px); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; width: 100vw; height: 100vh; }
        .sending-spinner { width: 55px; height: 55px; border: 6px solid rgba(255,255,255,0.1); border-top-color: var(--sda-toska); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #toastContainer { position: fixed; top: 30px; right: 30px; z-index: 100005; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 18px 30px; border-radius: 15px; background: #0b1120; border-left: 5px solid var(--sda-toska); color: white; font-weight: 800; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; }

        #cameraUI { display: none; position: fixed; inset: 0; z-index: 10000; background: #000; }
        #vStream { width: 100%; height: 100%; object-fit: cover; }
        .shutter { width: 85px; height: 85px; border: 6px solid white; border-radius: 50%; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: transparent; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 15px 15px 150px 15px; width: 100%; }
            .photo-hero-wrap { max-width: 180px; }
            .unified-card, .form-unified-box { border-radius: 40px; padding: 30px 15px 30px 15px; }
            .bottom-nav { display: flex !important; position: fixed; bottom: 20px; left: 15px; right: 15px; height: 72px; background: #0f172a; border: 1px solid var(--glass-border); border-radius: 35px; z-index: 1000; justify-content: space-around; align-items: center; backdrop-filter: blur(25px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
            .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.6rem; font-weight: 700; }
            .b-nav-item.active { color: var(--sda-toska) !important; }
            .b-nav-fab { width: 62px; height: 62px; background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -55px; border: 4px solid #050a18; color: white; }
        }
    </style>
</head>

            <img src="" id="sidebarLogo" alt="Logo">

                <h1 style="font-weight: 800; font-size: 1.1rem;"><span style="color:var(--pu-blue)">PU</span> <span style="color:var(--sda-toska)">SDA</span></h1>

    <main class="main-content">
        <!-- STEP 1: PILIH PETUGAS -->
        <section id="stepSelector" class="step-container">
            <div class="photo-hero-wrap" id="pWrap"><img id="pImg" src="" alt="Pegawai"></div>
            <div class="unified-card">
                <div style="text-align: center; width: 100%;">
                    <p id="pWil" style="font-size:0.75rem; font-weight:800; color:var(--sda-toska); letter-spacing:2px; margin-bottom:5px; text-transform:uppercase;">WILAYAH: ...</p>
                    <div class="name-scroller-box">
                        <button class="btn-circle-nav" onclick="navU(-1)"><i data-lucide="chevron-left" size="28"></i></button>

                        <button class="btn-circle-nav" onclick="navU(1)"><i data-lucide="chevron-right" size="28"></i></button>
                    </div>
                </div>
                <div class="search-area-unified">
                    <input type="text" id="searchInput" placeholder="Cari Nama Petugas..." oninput="onSearchInput(this.value)">
                    <button class="mic-trigger" onclick="startMic('search')" id="micSearch"><i data-lucide="mic" size="24"></i></button>
                </div>
                <div class="chips-list-row" id="wilChips"></div>

        <!-- STEP 2: FORM INPUT -->
        <section id="stepForm" class="step-container" style="display:none;">

                <div class="presence-main-controls">
                    <div class="btn-presence-mega btn-hadir active" onclick="setS(this, 'HADIR')"><i data-lucide="sun" size="28"></i><span>HADIR</span></div>

    <!-- CAMERA UI -->
    <div id="cameraUI"><video id="vStream" autoplay playsinline muted></video><button class="shutter" style="width:85px; height:85px; border:6px solid white; border-radius:50%; position:absolute; bottom:50px; left:50%; transform:translateX(-50%); background:transparent; cursor:pointer;" id="shutterBtn"></button><button onclick="stopCam()" style="position:absolute; top:25px; right:25px; color:white; background:rgba(0,0,0,0.5); width:45px; height:45px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center;"><i data-lucide="x"></i></button></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzQIExXFgyE2tJM5si70CaLGBYWRvYBdqI9DJeF-GXzSoZiuw3ASs7tmGx7_TzHMUMy/exec";
        let dbE = [], dbF = [], uIdx = 0, map, marker, uPos = {lat:0, lng:0}, cType = '', sB64 = null, kB64 = null, selectedStatus = 'HADIR', searchTimeout = null, photoCache = {};

        // Audio Assets
        const sndShutter = new Audio('https://assets.mixkit.co/active_storage/sfx/738/738-preview.mp3');

        window.onload = () => {
            lucide.createIcons();
            initMap();
            loadData();
            setInterval(() => { 
                const liveClockEl = document.getElementById('liveClock');
                if (liveClockEl) liveClockEl.innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}); 
            }, 1000);
            
            const shutter = document.getElementById('shutterBtn');
            if(shutter) shutter.onclick = () => { 
                const v = document.getElementById('vStream');
                if (v && v.readyState >= 2 && v.videoWidth > 0) {
                    sndShutter.play();
                    capturePhoto(); 
                } else {
                    showToast("Sensor sedang inisialisasi...", "error");
                }
            };
        };

        function haptic() { if (navigator.vibrate) navigator.vibrate(50); }

        async function loadData() {
            setLoading(true, "Sinkronisasi...");
            try {
                const r = await fetch(API + "?action=getDashboardData");
                const d = await r.json();
                dbE = d.pegawai || []; dbF = [...dbE];
                const logoEl = document.getElementById('sidebarLogo');
                if(logoEl && d.config?.Logo) logoEl.src = d.config.Logo;
                renderChips(); upUI();
                preloadAllPhotos();
            } catch (e) { showToast("Koneksi gagal", "error"); }
            setLoading(false);
        }

        function getSmartUrl(url) { if(!url || !url.includes('googleusercontent.com')) return url; return url.split('=')[0] + '=s500'; }

        function preloadAllPhotos() {
            dbE.slice(0, 20).forEach(p => { 
                const imgUrl = getSmartUrl(p.Link_Foto_Profile);
                if(imgUrl) { const i = new Image(); i.src = imgUrl; photoCache[p.ID] = i; }
            });
        }

        function renderChips() {
            const chipEl = document.getElementById('wilChips');
            if(!chipEl) return;
            const wils = ["ALL", ...new Set(dbE.map(p => p.Wilayah).filter(w => w))];
            chipEl.innerHTML = wils.map(w => `<div class="chip-pill ${w==='ALL'?'active':''}" onclick="filterWil('${w}', this)">${w}</div>`).join('');
        }

        function filterWil(w, el) {
            haptic();
            document.querySelectorAll('.chip-pill').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            dbF = w === 'ALL' ? [...dbE] : dbE.filter(p => p.Wilayah === w);
            uIdx = 0; upUI();
        }

        function upUI() {
            if(!dbF.length) return;
            const p = dbF[uIdx];
            
            const pWrap = document.getElementById('pWrap');
            const pImg = document.getElementById('pImg');
            const formHeroImg = document.getElementById('formHeroImg');
            const formMiniFoto = document.getElementById('formMiniFoto');
            const pName = document.getElementById('pName');
            const formName = document.getElementById('formName');

            if(pWrap) pWrap.classList.add('loading');
            const optimizedUrl = getSmartUrl(p.Link_Foto_Profile) || "https://via.placeholder.com/300x450";
            
            if(pImg) {
                pImg.src = optimizedUrl;
                pImg.onload = () => pWrap && pWrap.classList.remove('loading');
            }
            if(formHeroImg) formHeroImg.src = optimizedUrl;
            if(formMiniFoto) formMiniFoto.src = optimizedUrl;
            if(pName) pName.innerText = p.Nama;
            if(formName) formName.innerText = p.Nama;
            
            const pJob = document.getElementById('pJob');
            if(pJob) pJob.innerText = p.Jabatan || "STAFF";
            
            const pWil = document.getElementById('pWil');
            if(pWil) pWil.innerText = "WILAYAH: " + (p.Wilayah || "UPT");
            
            const formWil = document.getElementById('formWilayah');
            if(formWil) formWil.innerText = p.Wilayah || "WS Bondoyudo Baru";
        }

        function navU(d) { haptic(); uIdx = (uIdx + d + dbF.length) % dbF.length; upUI(); }
        function onSearchInput(v) { 
            clearTimeout(searchTimeout); 
            searchTimeout = setTimeout(() => { 
                dbF = dbE.filter(p => p.Nama.toLowerCase().includes(v.toLowerCase())); 
                uIdx = 0; upUI(); 
            }, 350); 
        }

        function initMap() { 
            const mapEl = document.getElementById('map');
            if(!mapEl) return;
            map = L.map('map', { zoomControl: false }).setView([-8.13, 113.22], 13); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map); 
            marker = L.marker([-8.13, 113.22]).addTo(map); 
        }

        function upLoc() { 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(pos => { 
                    uPos = {lat: pos.coords.latitude, lng: pos.coords.longitude}; 
                    const txt = document.getElementById('gpsTxt');
                    if(txt) txt.innerText = `GPS: ${uPos.lat.toFixed(5)}, ${uPos.lng.toFixed(5)}`; 
                    if(map) {
                        map.setView([uPos.lat, uPos.lng], 16); 
                        marker.setLatLng([uPos.lat, uPos.lng]); 
                        setTimeout(() => map.invalidateSize(), 400); 
                    }
                }, null, {enableHighAccuracy: true}); 
            } 
        }

        function openForm() { 
            haptic();
            const s1 = document.getElementById('stepSelector');
            const s2 = document.getElementById('stepForm');
            if(s1) s1.style.display = 'none'; 
            if(s2) s2.style.display = 'flex'; 
            setTimeout(() => { if(map) { map.invalidateSize(); upLoc(); } }, 300); 
        }
        function closeForm() { 
            haptic();
            const s1 = document.getElementById('stepSelector');
            const s2 = document.getElementById('stepForm');
            if(s1) s1.style.display = 'flex'; 
            if(s2) s2.style.display = 'none'; 
        }

        function setS(el, st) {
            haptic();
            document.querySelectorAll('.btn-presence-mega, .btn-presence-pill').forEach(i => i.classList.remove('active'));
            el.classList.add('active'); selectedStatus = st;
            const info = document.getElementById('statusInfo'); 
            if(!info) return;
            info.style.display = 'block';
            
            const now = new Date(), h = now.getHours(), m = now.getMinutes(), tVal = (h * 100) + m;
            
            if(st === 'HADIR') {
                if(tVal <= 740) { 
                    info.innerText = "Kehadiran Tepat Waktu Terverifikasi. Skor: 50. Terima kasih atas kedisiplinan Anda dalam bertugas."; 
                    info.style.color = "var(--success)"; info.style.borderLeftColor = "var(--success)";
                } else if(tVal <= 800) { 
                    info.innerText = "Kehadiran Tercatat (Terlambat). Skor: 40. Mohon tingkatkan ketepatan waktu pada jadwal berikutnya."; 
                    info.style.color = "var(--warning)"; info.style.borderLeftColor = "var(--warning)";
                } else { 
                    info.innerText = "Kehadiran Tercatat (Terlambat Signifikan). Skor: 25. Harap sertakan alasan keterlambatan pada kolom ringkasan tugas."; 
                    info.style.color = "var(--danger)"; info.style.borderLeftColor = "var(--danger)";
                }
            } else if(st === 'PULANG') {
                if(h < 10) { 
                    info.innerText = "Akses Terbatas. Sistem presensi pulang baru akan terbuka pada pukul 10:00 WIB sesuai kebijakan operasional."; 
                    info.style.color = "var(--danger)"; info.style.borderLeftColor = "var(--danger)";
                } else { 
                    info.innerText = "Presensi Pulang Berhasil. Skor: 50. Terima kasih atas dedikasi dan kinerja Anda hari ini. Selamat beristirahat."; 
                    info.style.color = "var(--pu-blue)"; info.style.borderLeftColor = "var(--pu-blue)";
                }
            } else { 
                info.innerText = `Status ${st} Telah Dipilih. Mohon pastikan dokumen pendukung atau keterangan detail telah dilampirkan pada kolom ringkasan.`; 
                info.style.color = "#a855f7"; info.style.borderLeftColor = "#a855f7";
            }
        }

        async function triggerCam(type) { 
            cType = type; 
            const ui = document.getElementById('cameraUI');
            if(ui) ui.style.display = 'flex'; 
            try { 
                const constraints = { 
                    video: { 
                        facingMode: type === 'selfie' ? "user" : "environment", 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    } 
                };
                const s = await navigator.mediaDevices.getUserMedia(constraints); 
                const v = document.getElementById('vStream');
                if(v) v.srcObject = s; 
            } catch (err) { 
                if(ui) ui.style.display = 'none';
                showToast("Akses kamera diblokir HP Anda.", "error");
            } 
        }
        
        /**
         * FIXED CAPTURE PHOTO: CENTER CROP SYMMETRY
         * Memastikan gambar tidak gepeng/lonjong dengan mengambil bagian tengah sensor kamera.
         */
        function capturePhoto() {
            const v = document.getElementById('vStream');
            if(!v) return;
            const c = document.createElement('canvas');
            
            // Target output: 720w x 960h (Rasio 3:4)
            c.width = 720; 
            c.height = 960; 
            const ctx = c.getContext('2d');
            
            const vWidth = v.videoWidth;
            const vHeight = v.videoHeight;
            const targetRatio = 720 / 960;
            const sourceRatio = vWidth / vHeight;
            
            let sX, sY, sW, sH;
            
            // Logika Center-Crop: Memotong bagian tengah video agar pas dengan rasio 3:4
            if (sourceRatio > targetRatio) {
                // Video terlalu lebar (misal 16:9), potong sisi kiri dan kanan
                sH = vHeight;
                sW = vHeight * targetRatio;
                sX = (vWidth - sW) / 2;
                sY = 0;
            } else {
                // Video terlalu tinggi, potong sisi atas dan bawah
                sW = vWidth;
                sH = vWidth / targetRatio;
                sX = 0;
                sY = (vHeight - sH) / 2;
            }
            
            // Gambar bagian tengah video ke canvas target
            ctx.drawImage(v, sX, sY, sW, sH, 0, 0, c.width, c.height);
            
            // --- PREMIUM WATERMARK ---
            const grad = ctx.createLinearGradient(0, 750, 0, 960);
            grad.addColorStop(0, "rgba(13, 27, 62, 0)"); 
            grad.addColorStop(0.3, "rgba(13, 27, 62, 0.9)"); 
            grad.addColorStop(1, "rgba(13, 27, 62, 1)");
            ctx.fillStyle = grad; 
            ctx.fillRect(0, 750, 720, 210);
            
            ctx.fillStyle = "var(--sda-toska)"; 
            ctx.fillRect(35, 820, 6, 110);
            
            ctx.fillStyle = "white"; 
            ctx.font = "bold 42px 'Plus Jakarta Sans'"; 
            const pName = document.getElementById('formName');
            ctx.fillText(pName ? pName.innerText.toUpperCase() : "STAFF", 55, 865);
            
            ctx.fillStyle = "var(--sda-toska)"; 
            ctx.font = "800 24px 'JetBrains Mono'"; 
            ctx.fillText(new Date().toLocaleString('id-ID'), 55, 905);
            
            ctx.fillStyle = "rgba(255,255,255,0.7)"; 
            ctx.font = "18px 'Plus Jakarta Sans'"; 
            ctx.fillText(`KOORDINAT: ${uPos.lat.toFixed(6)}, ${uPos.lng.toFixed(6)} | VERIFIED`, 55, 935);

            const data = c.toDataURL('image/jpeg', 0.7); 
            if(cType === 'selfie') { 
                const sImg = document.getElementById('sImg');
                if(sImg) { sImg.src = data; sImg.style.display='block'; }
                const sPh = document.getElementById('sPh');
                if(sPh) sPh.style.display = 'none';
                sB64 = data; 
            } else { 
                const kImg = document.getElementById('kImg');
                if(kImg) { kImg.src = data; kImg.style.display='block'; }
                const kPh = document.getElementById('kPh');
                if(kPh) kPh.style.display = 'none';
                kB64 = data; 
            }
            stopCam();
        }

        function stopCam() { 
            const v = document.getElementById('vStream'); 
            if(v && v.srcObject) {
                v.srcObject.getTracks().forEach(t => t.stop()); 
                v.srcObject = null;
            }
            const ui = document.getElementById('cameraUI');
            if(ui) ui.style.display = 'none'; 
        }
        
        async function subD() {
            haptic();
            const n = document.getElementById('notes').value.trim(); 
            if(!n || !sB64 || !kB64) { 
                showToast("Lengkapi Foto & Ringkasan Tugas!", "error"); 
                return; 
            }
            setLoading(true, "Mengirim Data...");
            const p = dbF[uIdx];
            const payload = { action: 'presensi', idPegawai: p.ID, nama: p.Nama, status: selectedStatus, selfie: sB64, workPhoto: kB64, keterangan: n, gps: `${uPos.lat},${uPos.lng}`, wilayah: p.Wilayah || "-" };
            try { 
                const r = await fetch(API, { method: 'POST', body: JSON.stringify(payload) }); 
                const res = await r.json();
                if(res.status === 'success') {
                    showToast(res.message, "success");
                    setTimeout(() => window.location.reload(), 1500); 
                } else {
                    showToast(res.message, "error");
                    setLoading(false);
                }
            } catch (e) { window.location.reload(); }
        }

        function startMic(tid) {
            haptic();
            const S = window.SpeechRecognition || window.webkitSpeechRecognition; 
            if(!S) return showToast("Fitur suara tidak didukung browser ini.", "error");
            const r = new S(); r.lang = 'id-ID';
            const btn = (tid === 'search') ? document.getElementById('micSearch') : document.getElementById('micNote');
            r.onstart = () => btn && btn.classList.add('recording');
            r.onresult = (e) => { 
                const txt = e.results[0][0].transcript; 
                if(tid === 'search') { 
                    const si = document.getElementById('searchInput'); 
                    if(si) { si.value = txt; onSearchInput(txt); } 
                } else { 
                    const nt = document.getElementById('notes'); 
                    if(nt) nt.value += txt; 
                } 
            };
            r.onend = () => btn && btn.classList.remove('recording'); r.start();
        }

        function setLoading(s, text) { 
            const overlay = document.getElementById('sendingOverlay');
            const textEl = document.getElementById('overlayText');
            if (overlay && textEl) {
                textEl.innerText = text; 
                overlay.style.display = s ? 'flex' : 'none'; 
            }
        }

        function showToast(m, t="success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(t === "error") toast.style.borderLeftColor = "var(--danger)";
            toast.innerHTML = `<i data-lucide="${t==='success'?'check-circle':'alert-circle'}"></i> ${m}`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
        }
    </script>
</body>
