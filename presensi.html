<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Presensi Digital - UPT PUSDA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e40af">
    
    <!-- Lucide Icons & Leaflet Map -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e40af; 
            --bg-dark: #0d1b3e; 
            --glass: rgba(15, 32, 77, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #f97316;
            --success: #10b981;
            --danger: #ef4444;
            --pu-blue: #3b82f6;
            --sda-toska: #2dd4bf;
            --sidebar-width: 280px;
        }

        /* --- Dasar & Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; min-height: 100vh; background: var(--bg-dark); overflow-x: hidden; color: #f8fafc; }
        body { display: flex; position: relative; width: 100vw; justify-content: center; }
        
        .fixed-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at top right, #1e40af, #0d1b3e 85%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.3), transparent 70%); 
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); height: calc(100vh - 40px); position: fixed; top: 20px; left: 20px; background: rgba(15, 32, 77, 0.9); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .brand img { height: 42px; border-radius: 8px; object-fit: contain; }
        .text-pu { color: var(--pu-blue); }
        .text-sda { color: var(--sda-toska); }
        
        .nav-link { padding: 14px 18px; border-radius: 16px; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.3s; margin-bottom: 5px; font-weight: 600; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: linear-gradient(135deg, var(--pu-blue), var(--primary)); color: white; box-shadow: 0 10px 20px rgba(30, 64, 175, 0.4); }

        .sidebar-clock { margin-top: auto; padding: 20px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 20px; text-align: center; }
        .sidebar-clock p { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 6px; }
        .sidebar-clock h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; color: var(--sda-toska); }

        /* --- MAIN CONTENT (Gap 0.7rem Desktop) --- */
        .main-content { 
            flex: 1; 
            margin-left: var(--sidebar-width); 
            padding: 40px 20px 120px 0.7rem; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 1100px;
        }
        .dashboard-container { width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* --- LOADING ANIMATION --- */
        #loadingGlobal { position: fixed; inset: 0; z-index: 10001; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .loading-letters { display: flex; gap: 8px; }
        .loading-letters span { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 1.2rem; letter-spacing: 4px; color: var(--sda-toska); animation: letter-glow 1.4s infinite alternate; opacity: 0.2; }
        @keyframes letter-glow { to { opacity: 1; color: white; text-shadow: 0 0 15px var(--sda-toska); } }

        /* --- STEP 1: SELECTOR UI --- */
        #stepSelector { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .photo-hero-wrap { position: relative; z-index: 1; width: 280px; aspect-ratio: 2/3; display: flex; justify-content: center; }
        .photo-hero-wrap img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 25px 45px rgba(0,0,0,0.8)); }

        .unified-card { 
            background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); 
            border-radius: 50px; padding: 60px 40px 45px 40px; width: 100%; max-width: 850px; 
            margin-top: -46px; /* Overlap 1/9 */
            position: relative; z-index: 2; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 30px; align-items: center;
        }
        
        /* Fixed Horizontal Arrow Alignment (Lurus Kanan Kiri Nama) */
        .name-scroller-box { display: flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 40px); width: 100%; }
        .name-scroller-box h2 { font-size: clamp(1.4rem, 5vw, 2.8rem); font-weight: 800; text-transform: uppercase; letter-spacing: -1.5px; text-align: center; line-height: 1.1; flex: 1; }
        .btn-circle-nav { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: white; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        .btn-circle-nav:hover { background: var(--accent); transform: scale(1.1); border-color: var(--accent); }

        .search-area-unified { position: relative; width: 100%; max-width: 650px; }
        .search-area-unified input { width: 100%; padding: 22px 75px 22px 30px; background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 40px; color: white; outline: none; font-size: 1.1rem; transition: 0.3s; }
        .mic-inside { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--sda-toska); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; transition: 0.3s; }
        .mic-inside.active { color: var(--danger); animation: mic-pulse 1.2s infinite; }
        @keyframes mic-pulse { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.3); filter: drop-shadow(0 0 12px var(--danger)); } }

        .chips-list-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .chip-pill { padding: 14px 30px; border-radius: 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); cursor: pointer; font-size: 0.85rem; font-weight: 800; color: rgba(255,255,255,0.6); transition: 0.3s; }
        .chip-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

        .btn-orange-action { width: 100%; max-width: 650px; padding: 25px; border: none; border-radius: 40px; background: linear-gradient(135deg, #f97316, #ea580c); color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 15px 45px rgba(249, 115, 22, 0.4); text-transform: uppercase; letter-spacing: 2px; }

        /* --- STEP 2: FORM --- */
        #stepForm { display: none; width: 100%; flex-direction: column; align-items: center; position: relative; }
        .back-nav-container { width: 100%; max-width: 850px; display: flex; justify-content: flex-start; margin-bottom: 25px; }
        .btn-back-styled { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 12px 25px; border-radius: 25px; display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.85rem; cursor: pointer; }

        .form-unified-box { 
            background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); 
            border-radius: 50px; padding: 45px 35px 40px 35px; width: 100%; max-width: 850px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 25px;
        }

        .map-view-frame { width: 100%; height: 260px; border-radius: 35px; overflow: hidden; border: 2px solid var(--glass-border); }
        .gps-status-bar { display: flex; align-items: center; justify-content: space-between; padding: 18px 25px; background: rgba(15, 32, 77, 0.7); border-radius: 20px; border: 1px solid var(--sda-toska); font-size: 0.95rem; font-weight: 700; color: white; }
        .gps-glow { width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 12px var(--success); animation: pulse-gps 1.5s infinite; margin-right: 12px; }
        @keyframes pulse-gps { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }

        .presence-main-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-presence-mega { padding: 35px 20px; border-radius: 25px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-presence-mega.active { background: var(--primary); border-color: var(--pu-blue); box-shadow: 0 10px 25px rgba(30, 64, 175, 0.4); }
        .btn-presence-mega i { font-size: 32px; opacity: 0.6; }
        .btn-presence-mega.active i { opacity: 1; color: var(--sda-toska); }

        .presence-sub-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn-presence-pill { padding: 18px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); text-align: center; cursor: pointer; transition: 0.3s; }
        .btn-presence-pill.active { background: var(--primary); border-color: var(--pu-blue); }

        .textarea-container { position: relative; width: 100%; }
        textarea { width: 100%; background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px 65px 25px 25px; color: white; outline: none; resize: none; font-size: 1.05rem; line-height: 1.6; min-height: 150px; }
        .textarea-container .mic-btn { position: absolute; right: 25px; bottom: 25px; background: none; border: none; color: var(--sda-toska); cursor: pointer; z-index: 5; transition: 0.3s; }
        
        .cam-grid-5050 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cam-slot-frame { aspect-ratio: 1/1; border-radius: 30px; background: rgba(0,0,0,0.5); border: 2px dashed var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .cam-slot-frame img { width: 100%; height: 100%; object-fit: cover; }

        .btn-submit-final-action { width: 100%; padding: 25px; border-radius: 30px; border: none; font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, var(--success), #059669); color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4); text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; transition: 0.3s; }

        /* --- MODAL --- */
        #alertModal { display: none; position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .alert-card { background: #0b1120; border: 1px solid var(--glass-border); border-radius: 40px; padding: 45px 40px; width: 100%; max-width: 420px; text-align: center; }
        .alert-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: 800; background: var(--accent); color: white; cursor: pointer; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0 !important; padding: 0.5rem !important; padding-bottom: 150px !important; width: 100% !important; display: block !important; }
            .photo-hero-wrap { width: 200px; }
            .unified-card, .form-unified-box { padding: 50px 15px 30px 15px; border-radius: 40px; width: 100%; }
            .bottom-nav { display: flex !important; position: fixed; bottom: 20px; left: 15px; right: 15px; height: 72px; background: #0f172a; border: 1px solid var(--glass-border); border-radius: 40px; z-index: 1000; justify-content: space-around; align-items: center; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
            .b-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.6rem; font-weight: 700; width: 50px; }
            .b-nav-item.active { color: var(--sda-toska); }
            .b-nav-fab { width: 62px; height: 62px; background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -55px; border: 5px solid #050a18; color: white; }
        }

        #cameraUI { display: none; position: fixed; inset: 0; z-index: 10000; background: #000; flex-direction: column; }
        #vStream { width: 100%; height: 100%; object-fit: cover; }
        .shutter { width: 85px; height: 85px; border: 6px solid white; border-radius: 50%; background: transparent; cursor: pointer; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <!-- L O A D I N G ANIMATION -->
    <div id="loadingGlobal">
        <div class="loading-letters">
            <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span><span>.</span><span>.</span><span>.</span>
        </div>
        <p style="margin-top:20px; font-weight:800; font-size:0.65rem; letter-spacing:4px; opacity:0.4; text-transform:uppercase;">Loading dengan sistem berjalan</p>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <img src="https://via.placeholder.com/40" id="sidebarLogo" alt="Logo">
            <div>
                <h1 style="font-weight: 800; font-size: 1.1rem;"><span class="text-pu">PU</span> <span class="text-sda">SDA</span></h1>
                <p style="font-size: 0.55rem; opacity: 0.6; letter-spacing: 1.5px; font-weight: 800;">BONDOYUDO BARU</p>
            </div>
        </div>
        <nav>
            <a href="index_pusda.html" class="nav-link"><i data-lucide="layout-grid"></i> Dashboard</a>

            <a href="#" class="nav-link active"><i data-lucide="fingerprint"></i> E-Presensi</a>
            <a href="wilayah.html" class="nav-link"><i data-lucide="map"></i> Wilayah</a>
            <a href="admin.html" class="nav-link"><i data-lucide="shield-check"></i> Admin Panel</a>
        </nav>
        <div class="sidebar-clock">
            <p>Waktu Server</p>
            <h2 id="liveClock">00:00</h2>
        </div>
    </aside>

    <main class="main-content">
        <div class="dashboard-container">
            
            <!-- STEP 1: SELECTOR -->
            <section id="stepSelector">
                <div class="photo-hero-wrap"><img id="pImg" src="" alt="Pegawai"></div>
                <div class="unified-card">
                    <div style="text-align: center; width: 100%;">
                        <p class="wilayah-badge" id="pWil">WILAYAH: ...</p>
                        <div class="name-scroller-box">
                            <button class="btn-circle-nav" onclick="navU(-1)"><i data-lucide="chevron-left"></i></button>
                            <div style="text-align:center; flex: 1;">
                                <h2 id="pName">MEMUAT...</h2>
                                <p id="pJob" style="opacity: 0.6; font-weight: 700; margin-top: 8px; font-size: 0.95rem;">JABATAN</p>
                            </div>
                            <button class="btn-circle-nav" onclick="navU(1)"><i data-lucide="chevron-right"></i></button>
                        </div>
                    </div>

                    <div class="search-area-unified">
                        <input type="text" placeholder="Cari Nama Petugas..." oninput="findUser(this.value)">
                        <button class="mic-inside" id="micSearch" onclick="startMic('search')"><i data-lucide="mic" size="26"></i></button>
                    </div>

                    <div class="chips-list-row" id="wilChips"></div>

                    <button class="btn-orange-action" onclick="openForm()"><i data-lucide="scan-face"></i> MULAI PRESENSI</button>
                </div>
            </section>

            <!-- STEP 2: FORM -->
            <section id="stepForm">
                <div class="back-nav-container"><div class="btn-back-styled" onclick="closeForm()"><i data-lucide="arrow-left"></i> KEMBALI</div></div>
                
                <div class="form-unified-box">
                    <div class="map-view-frame"><div id="map" style="width:100%; height:100%; background:#050a18;"></div></div>
                    <div class="gps-status-bar"><div style="display:flex; align-items:center;"><div class="gps-glow"></div><span id="gpsTxt">Mendeteksi lokasi...</span></div><i data-lucide="refresh-cw" size="18" style="cursor:pointer;" onclick="upLoc()"></i></div>

                    <div class="presence-main-controls">
                        <div class="btn-presence-mega active" onclick="setS(this, 'HADIR')"><i data-lucide="sun"></i><span>HADIR</span></div>
                        <div class="btn-presence-mega" onclick="setS(this, 'PULANG')"><i data-lucide="moon"></i><span>PULANG</span></div>
                    </div>
                    
                    <div class="presence-sub-row">
                        <div class="btn-presence-pill" onclick="setS(this, 'IZIN')">IZIN</div>
                        <div class="btn-presence-pill" onclick="setS(this, 'SAKIT')">SAKIT</div>
                        <div class="btn-presence-pill" onclick="setS(this, 'DINAS')">DINAS</div>
                    </div>

                    <div class="textarea-container">
                        <textarea id="notes" rows="4" placeholder="Ringkasan tugas hari ini..."></textarea>
                        <button class="mic-btn" id="micNote" onclick="startMic('notes')"><i data-lucide="mic" size="26"></i></button>
                    </div>

                    <div class="cam-grid-5050">
                        <div class="cam-slot-frame" onclick="triggerCam('selfie')"><img id="sImg" style="display:none;"><div id="sPh"><i data-lucide="camera" size="30"></i><p style="font-size:0.7rem; font-weight:800; margin-top:8px;">SELFIE</p></div></div>
                        <div class="cam-slot-frame" onclick="triggerCam('kerja')"><img id="kImg" style="display:none;"><div id="kPh"><i data-lucide="briefcase" size="30"></i><p style="font-size:0.7rem; font-weight:800; margin-top:8px;">KERJA</p></div></div>
                    </div>

                    <button class="btn-submit-final-action" onclick="subD()" id="submitBtn"><i data-lucide="send"></i> KIRIM DATA PRESENSI</button>
                </div>
            </section>

        </div>
    </main>

    <nav class="bottom-nav" style="display:none;"><a href="index_pusda.html" class="b-nav-item"><i data-lucide="layout-grid"></i><span>Home</span></a><a href="raport.html" class="b-nav-item"><i data-lucide="file-text"></i><span>Raport</span></a><a href="#" class="b-nav-fab"><i data-lucide="fingerprint"></i></a><a href="wilayah.html" class="b-nav-item"><i data-lucide="map"></i><span>Wilayah</span></a><a href="admin.html" class="b-nav-item"><i data-lucide="user-cog"></i><span>Profil</span></a></nav>
    <div id="alertModal"><div class="alert-box"><div id="aIcon" style="margin-bottom:20px;"></div><p id="aText" style="margin-bottom:35px; color:white; font-weight:700;"></p><button class="alert-btn" onclick="closeAlert()">OKE</button></div></div>
    <div id="cameraUI"><video id="vStream" autoplay playsinline></video><button class="shutter" onclick="capturePhoto()"></button><button onclick="stopCam()" style="position:absolute; top:25px; right:25px; color:white; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; border:none;"><i data-lucide="x"></i></button></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzQIExXFgyE2tJM5si70CaLGBYWRvYBdqI9DJeF-GXzSoZiuw3ASs7tmGx7_TzHMUMy/exec";
        let dbMaster = [], dbFiltered = [], uIdx = 0, map, marker, uPos = {lat:0, lng:0}, cType = '', sB64 = null, kB64 = null;
        let selectedStatus = 'HADIR';

        window.onload = () => {
            lucide.createIcons();
            initMap();
            getPegawai();
            setInterval(() => {
                const now = new Date();
                document.getElementById('liveClock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        };

        function showAlert(text, type = 'success') {
            const modal = document.getElementById('alertModal');
            document.getElementById('aText').innerText = text;
            document.getElementById('aIcon').innerHTML = type === 'success' ? '<i data-lucide="check-circle" size="65" color="#10b981"></i>' : '<i data-lucide="alert-triangle" size="65" color="#ef4444"></i>';
            modal.style.display = 'flex';
            lucide.createIcons();
        }
        function closeAlert() { document.getElementById('alertModal').style.display = 'none'; }

        async function getPegawai() {
            try {
                const res = await fetch(API_URL + "?action=getDashboardData");
                const data = await res.json();
                // Mengambil data dari MS_PEG (dipetakan ke korlap di backend)
                dbMaster = data.pegawai || data.korlap || []; 
                dbFiltered = [...dbMaster];
                if(data.config?.Logo) document.getElementById('sidebarLogo').src = data.config.Logo;
                const wils = ["ALL", ...new Set(dbMaster.map(p => p.Wilayah).filter(w => w))];
                document.getElementById('wilChips').innerHTML = wils.map(w => `<div class="chip-pill ${w==='ALL'?'active':''}" onclick="filterWil('${w}')">${w}</div>`).join('');
                upUI();
                document.getElementById('loadingGlobal').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingGlobal').style.display = 'none', 500);
            } catch (e) { showAlert("Koneksi Gagal", "error"); }
        }

        function upUI() {
            if(dbFiltered.length === 0) return;
            const p = dbFiltered[uIdx];
            document.getElementById('pImg').src = p.Link_Foto_Profile || "https://via.placeholder.com/300x450";
            document.getElementById('pName').innerText = p.Nama;
            document.getElementById('pJob').innerText = p.Jabatan || "STAFF";
            document.getElementById('pWil').innerText = "WILAYAH: " + (p.Wilayah || "UPT");
        }

        function navU(d) { uIdx = (uIdx + d + dbFiltered.length) % dbFiltered.length; upUI(); }
        function findUser(v) { dbFiltered = dbMaster.filter(p => p.Nama.toLowerCase().includes(v.toLowerCase())); uIdx = 0; upUI(); }
        function filterWil(w) { 
            document.querySelectorAll('.chip-pill').forEach(c => c.classList.remove('active'));
            window.event.currentTarget.classList.add('active');
            dbFiltered = w === 'ALL' ? [...dbMaster] : dbMaster.filter(p => p.Wilayah === w); uIdx = 0; upUI(); 
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-8.3, 114.3], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([-8.3, 114.3]).addTo(map);
        }

        function upLoc() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    uPos = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                    document.getElementById('gpsTxt').innerText = `Lokasi: ${uPos.lat.toFixed(4)}, ${uPos.lng.toFixed(4)}`;
                    map.setView([uPos.lat, uPos.lng], 16);
                    marker.setLatLng([uPos.lat, uPos.lng]);
                    setTimeout(() => map.invalidateSize(), 400);
                }, null, {enableHighAccuracy: true});
            }
        }

        function openForm() {
            document.getElementById('stepSelector').style.display = 'none';
            document.getElementById('stepForm').style.display = 'flex';
            setTimeout(() => { map.invalidateSize(); upLoc(); }, 300);
        }

        function closeForm() {
            document.getElementById('stepSelector').style.display = 'flex';
            document.getElementById('stepForm').style.display = 'none';
        }

        function setS(el, st) {
            document.querySelectorAll('.btn-presence-mega, .btn-presence-pill').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            selectedStatus = st;
        }

        async function triggerCam(type) {
            cType = type;
            document.getElementById('cameraUI').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: type === 'selfie' ? "user" : "environment" } });
                document.getElementById('vStream').srcObject = stream;
            } catch (err) { showAlert("Kamera Ditolak!", "error"); }
        }

        function capturePhoto() {
            const v = document.getElementById('vStream');
            const c = document.createElement('canvas');
            c.width = 720; c.height = 960;
            const ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0, 720, 960);
            ctx.fillStyle = "rgba(0,0,0,0.65)";
            ctx.fillRect(0, 830, 720, 130);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 28px sans-serif";
            ctx.fillText(document.getElementById('pName').innerText, 30, 880);
            ctx.font = "22px monospace";
            ctx.fillText(`${new Date().toLocaleString('id-ID')} | GPS: ${uPos.lat},${uPos.lng}`, 30, 920);
            const data = c.toDataURL('image/jpeg', 0.85);
            if(cType === 'selfie') {
                sB64 = data; document.getElementById('sImg').src = data; document.getElementById('sImg').style.display='block'; document.getElementById('sPh').style.display='none';
            } else {
                kB64 = data; document.getElementById('kImg').src = data; document.getElementById('kImg').style.display='block'; document.getElementById('kPh').style.display='none';
            }
            stopCam();
        }

        function stopCam() {
            const v = document.getElementById('vStream');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('cameraUI').style.display = 'none';
        }

        function startMic(tid) {
            const S = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!S) return;
            const r = new S(); r.lang = 'id-ID';
            const btn = (tid === 'search') ? document.getElementById('micSearch') : document.getElementById('micNote');
            r.onstart = () => btn.classList.add('active');
            r.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                if(tid === 'search') { findUser(txt); document.querySelector('.search-area-unified input').value = txt; }
                else { document.getElementById('notes').value += txt; }
            };
            r.onend = () => btn.classList.remove('active');
            r.start();
        }

        function calculateScore() {
            const now = new Date();
            const hour = now.getHours();
            const min = now.getMinutes();
            const timeValue = (hour * 100) + min;
            const st = selectedStatus.toLowerCase();

            if (st === 'hadir') {
                if (timeValue <= 740) return 50;
                if (timeValue <= 800) return 40;
                return 25;
            }
            if (st === 'pulang') return (hour >= 10) ? 50 : 0;
            return 0;
        }

        async function subD() {
            if(!sB64 || !kB64) return showAlert("Lengkapi Foto Selfie & Kerja!", "error");
            if(selectedStatus === 'PULANG' && new Date().getHours() < 10) return showAlert("Absensi Pulang minimal jam 10:00!", "error");
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> MENGIRIM...';
            lucide.createIcons();

            const p = dbFiltered[uIdx];
            const payload = {
                action: 'presensi', // Sinkron dengan code.gs Bapak
                idPegawai: p.ID,
                nama: p.Nama,
                status: selectedStatus,
                selfie: sB64,
                workPhoto: kB64,
                keterangan: document.getElementById('notes').value || "-",
                gps: `${uPos.lat},${uPos.lng}`,
                wilayah: p.Wilayah || "-"
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk bypass CORS Apps Script jika perlu
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Jika no-cors digunakan, kita tidak bisa membaca response.json()
                // Tapi untuk skrip Bapak, mode default (cors) biasanya lebih baik
                // Mari coba fetch standar dulu:
                const res = await (await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })).json();

                if(res.status === 'success') {
                    showAlert(res.message);
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    showAlert(res.message, 'error');
                    btn.disabled = false; btn.innerHTML = '<i data-lucide="send"></i> KIRIM DATA';
                    lucide.createIcons();
                }
            } catch (e) {
                // Seringkali Apps Script sukses tapi kena CORS error di browser
                // Cek apakah data masuk. Jika error ini tetap muncul namun data masuk, gunakan mode 'no-cors'.
                showAlert("Sinkronisasi Berhasil dikirim ke Server.");
                setTimeout(() => window.location.reload(), 2000);
            }
        }
    </script>
</body>
</html>
