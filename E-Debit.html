        // ==========================================
        // GLOBAL HOISTED UTILITY FUNCTIONS
        // ==========================================
        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                const later = () => { clearTimeout(timeout); func(...args); };
                clearTimeout(timeout); 
                timeout = setTimeout(later, wait);
            };
        }

        function getCurrentDateStr() { 
            const d = new Date(); 
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; 
        }
        
        function getCurrentTimeStr() { 
            const d = new Date(); 
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; 
        }

        function hitungPersentase(realisasi, baku) { 
            const r = parseFloat(realisasi) || 0; 
            const b = parseFloat(baku) || 0; 
            if (b === 0) return 0; 
            return Math.round((r / b) * 100); 
        }

        function formatDateIndo(dateStr) {
            if(!dateStr) return { hari: '-', tanggal: '-' };
            const d = new Date(dateStr);
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            return { hari: days[d.getDay()], tanggal: `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}` };
        }

        function generateMessageFormatter(data) {
            const persen = hitungPersentase(data.realisasiTanam, data.luasBaku);
            const nameBndg = data.namaBendung ? data.namaBendung.toUpperCase() : '-';
            const dtInfo = formatDateIndo(data.tanggalLaporan);
            
            let attachText = '';
            if (data.attachments && data.attachments.length > 0) {
                attachText = data.attachments.map((att, idx) => {
                    let linkText = att.driveUrl ? `\n🔗 Link: ${att.driveUrl}` : '';
                    return `${idx + 1}. ${att.name}${linkText}`;
                }).join('\n\n');

Pada bendung ( ${nameBndg} )

Hari         : ${dtInfo.hari}
Tanggal      : ${dtInfo.tanggal}

Nama DI      : ${data.namaDI || '-'}

*1. DEBIT pada bangunan Utama.*

● intake [ kiri ] (luas layanan : ${data.luasKiri || '-'} ha)
Qact   : ${data.qactKiri || '-'} m³/dt
Qd     : ${data.qdKiri || '-'} m³/dt (sesuai RAAR)

● intake [ kanan ] (luas layanan : ${data.luasKanan || '-'} ha)
Qact   : ${data.qactKanan || '-'} m³/dt
Qd     : ${data.qdKanan || '-'} m³/dt (sesuai RAAR)

________________________________________
*2. Informasi Cuaca*
Cuaca      : ${data.cuaca || '-'}
Status     : ${data.status || '-'}
Ket        : ${data.ketCuaca || '-'}

________________________________________
*3. Informasi Luas Realisasi tanam.*
Masa Tanam : ${data.masaTanam || '-'}
Realisasi  : ${data.realisasiTanam || '-'} ha (${persen}% dari luas baku ${data.luasBaku || '-'} ha)

Lampiran:
${attachText || '-'}`.trim();

                case 'wifi-off': return <svg {...baseProps}>{t}<line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>;
                case 'map': return <svg {...baseProps}>{t}<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>;
                case 'chevron-down': return <svg {...baseProps}>{t}<polyline points="6 9 12 15 18 9"/></svg>;
                case 'printer': return <svg {...baseProps}>{t}<path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect width="12" height="8" x="6" y="14"></rect></svg>;
                default: return null;
            }
        };

        const Modal = ({ isOpen, onClose, title, children, actions, role = "dialog" }) => {
            const modalRef = useRef(null);
            const prevFocus = useRef(null);

            useEffect(() => {
                if (isOpen) { prevFocus.current = document.activeElement; modalRef.current?.focus(); document.body.style.overflow = 'hidden'; } 
                else { document.body.style.overflow = ''; prevFocus.current?.focus(); }
                return () => { document.body.style.overflow = ''; };
            }, [isOpen]);

            useEffect(() => {
                const handleEscape = (e) => { if (e.key === 'Escape' && isOpen) onClose(); };
                document.addEventListener('keydown', handleEscape);
                return () => document.removeEventListener('keydown', handleEscape);
            }, [isOpen, onClose]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm modal-enter" onClick={(e) => e.target === e.currentTarget && onClose()} role="presentation" aria-modal="true">
                    <div ref={modalRef} tabIndex={-1} className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden focus-ring flex flex-col border border-slate-200 dark:border-slate-700" role={role} aria-labelledby="modal-title">
                        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700 shrink-0 bg-white dark:bg-slate-800">
                            <h3 id="modal-title" className="text-base font-bold text-slate-900 dark:text-white tracking-tight">{title}</h3>
                            <button onClick={onClose} className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors touch-target focus-ring text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" aria-label="Tutup"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <div className="px-6 py-5 overflow-y-auto custom-scrollbar flex-1">
                            {children}
                        </div>
                        {actions && (
                            <div className="px-6 py-4 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-200 dark:border-slate-700 flex gap-3 justify-end shrink-0">
                                {actions}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ImageViewer = ({ src, onClose }) => {
            if (!src) return null;
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/95 backdrop-blur-sm modal-enter" onClick={onClose}>
                    <button onClick={onClose} className="absolute top-4 right-4 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white transition-colors">
                        <Icon name="x" className="w-6 h-6" />
                    </button>
                    <img src={src} alt="Preview Penuh" className="max-w-full max-h-screen object-contain p-4 shadow-2xl rounded-lg" />
                </div>
            );
        };

        const Toast = ({ message, type = "info", onUndo, undoLabel = "Undo", autoHide = true }) => {
            const [visible, setVisible] = useState(true);
            useEffect(() => {
                if (autoHide) { const timer = setTimeout(() => setVisible(false), 5000); return () => clearTimeout(timer); }
            }, [autoHide]);

            if (!visible) return null;

            const typeStyles = { info: "bg-slate-800 text-white", success: "bg-emerald-600 text-white", error: "bg-red-600 text-white", warning: "bg-amber-500 text-white" };

            return (
                <div className={`fixed bottom-20 md:bottom-6 left-1/2 transform -translate-x-1/2 px-4 py-3 rounded-lg shadow-lg z-50 undo-toast flex items-center gap-3 border border-white/10 ${typeStyles[type]}`}>
                    {type === 'success' && <Icon name="check-circle-2" className="w-4 h-4" />}
                    {type === 'error' && <Icon name="alert-triangle" className="w-4 h-4" />}
                    {type === 'warning' && <Icon name="alert-triangle" className="w-4 h-4" />}
                    <span className="text-sm font-medium">{message}</span>
                    {onUndo && (<button onClick={() => { onUndo(); setVisible(false); }} className="ml-2 px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded text-xs font-bold transition-colors focus-ring shadow-sm">{undoLabel}</button>)}
                </div>
            );
        };

        const FormSectionHeader = ({ icon, title, theme }) => {
            const themes = {
                blue: { text: 'text-blue-600', bg: 'bg-blue-100 dark:bg-blue-900/30', border: 'border-l-blue-500' },
                indigo: { text: 'text-indigo-600', bg: 'bg-indigo-100 dark:bg-indigo-900/30', border: 'border-l-indigo-500' },
                cyan: { text: 'text-cyan-600', bg: 'bg-cyan-100 dark:bg-cyan-900/30', border: 'border-l-cyan-500' },
                teal: { text: 'text-teal-600', bg: 'bg-teal-100 dark:bg-teal-900/30', border: 'border-l-teal-500' },
                amber: { text: 'text-amber-600', bg: 'bg-amber-100 dark:bg-amber-900/30', border: 'border-l-amber-500' },
                emerald: { text: 'text-emerald-600', bg: 'bg-emerald-100 dark:bg-emerald-900/30', border: 'border-l-emerald-500' },
                violet: { text: 'text-violet-600', bg: 'bg-violet-100 dark:bg-violet-900/30', border: 'border-l-violet-500' },
                slate: { text: 'text-slate-600 dark:text-slate-300', bg: 'bg-slate-100 dark:bg-slate-800', border: 'border-l-slate-400' },
            };
            const t = themes[theme] || themes.blue;
            
            return (
                <div className={`bg-white dark:bg-slate-800 px-5 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center gap-3 ${t.border} border-l-4`}>
                    <div className={`p-2 rounded-lg ${t.bg} ${t.text}`}>
                        <Icon name={icon} className="w-4 h-4 md:w-5 md:h-5" decorative={true} />
                    </div>
                    <h3 className="font-bold text-sm md:text-base text-slate-800 dark:text-slate-100 tracking-wide">{title}</h3>
                </div>
            );
        };

        const CollapsibleSection = ({ id, icon, title, theme, isExpanded, onToggle, children, errorFields }) => {
            const themes = {
                blue: { text: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-900/30', border: 'border-l-blue-500' },
                indigo: { text: 'text-indigo-600 dark:text-indigo-400', bg: 'bg-indigo-50 dark:bg-indigo-900/30', border: 'border-l-indigo-500' },
                cyan: { text: 'text-cyan-600 dark:text-cyan-400', bg: 'bg-cyan-50 dark:bg-cyan-900/30', border: 'border-l-cyan-500' },
                teal: { text: 'text-teal-600 dark:text-teal-400', bg: 'bg-teal-50 dark:bg-teal-900/30', border: 'border-l-teal-500' },
                amber: { text: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/30', border: 'border-l-amber-500' },
                emerald: { text: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-900/30', border: 'border-l-emerald-500' },
                violet: { text: 'text-violet-600 dark:text-violet-400', bg: 'bg-violet-50 dark:bg-violet-900/30', border: 'border-l-violet-500' }
            };
            const t = themes[theme] || themes.blue;
            const hasError = errorFields && errorFields.length > 0;
            
            return (
                <div className={`bg-white dark:bg-slate-800 rounded-xl shadow-sm border transition-all duration-300 mb-6 ${hasError ? 'border-red-400 dark:border-red-500 shadow-red-100 dark:shadow-none' : 'border-slate-200 dark:border-slate-700'}`}>
                    <div onClick={() => onToggle(id)} className={`px-5 py-4 flex items-center gap-3 cursor-pointer select-none transition-colors border-b ${isExpanded ? 'border-slate-100 dark:border-slate-700' : 'border-transparent'} ${t.border} border-l-4 hover:bg-slate-50 dark:hover:bg-slate-700/30 rounded-t-xl`}>
                        <div className={`p-2 rounded-lg ${t.bg} ${t.text}`}>
                            <Icon name={icon} className="w-4 h-4 md:w-5 md:h-5" decorative={true} />
                        </div>
                        <h3 className="font-bold text-sm md:text-base text-slate-800 dark:text-slate-100 tracking-wide">{title}</h3>
                        
                        <div className="ml-auto flex items-center gap-3">
                            {hasError && <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>}
                            <div className={`transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}>
                                <Icon name="chevron-down" className="w-5 h-5 text-slate-400" />
                            </div>
                        </div>
                    </div>
                    <div className={`transition-all duration-500 ease-in-out ${isExpanded ? 'max-h-[2500px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        <div className="p-5 md:p-6 pb-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardMap = ({ history, isOnline, darkMode }) => {
            const mapRef = useRef(null);
            const mapInst = useRef(null);
            const markersGroup = useRef(null);

            useEffect(() => {
                if (!isOnline) return;
                if (!mapRef.current) return;

                if (!mapInst.current) {
                    mapInst.current = L.map(mapRef.current).setView([-7.75, 112.75], 7); 
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap',
                        maxZoom: 19
                    }).addTo(mapInst.current);
                    
                    markersGroup.current = L.layerGroup().addTo(mapInst.current);
                }

                markersGroup.current.clearLayers();

                const bounds = [];
                const validData = history.filter(h => h.latitude && h.longitude);
                
                validData.forEach(item => {
                    const lat = parseFloat(item.latitude);
                    const lng = parseFloat(item.longitude);
                    if (isNaN(lat) || isNaN(lng)) return;

                    let colorClass = 'bg-blue-500 border-blue-600';
                    const status = item.status?.toLowerCase() || '';
                    
                    if (status === 'aman') { colorClass = 'bg-emerald-500 border-emerald-600'; }
                    else if (status === 'waspada') { colorClass = 'bg-amber-400 border-amber-500'; }
                    else if (status === 'siaga') { colorClass = 'bg-orange-500 border-orange-600'; }
                    else if (status === 'awas') { colorClass = 'bg-red-500 border-red-600'; }

                    const html = `
                        <div class="relative flex h-5 w-5 items-center justify-center -ml-2.5 -mt-2.5">
                            <span class="relative inline-flex rounded-full h-3 w-3 border border-white shadow-sm ${colorClass}"></span>
                        </div>
                    `;

                    const customIcon = L.divIcon({ className: '', html: html, iconSize: [20, 20] });
                    
                    const popupContent = `
                        <div class="p-1 font-sans">
                            <p class="font-bold text-sm mb-1 text-slate-800">${item.namaBendung}</p>
                            <p class="text-xs text-slate-600 mb-1">TMA: <span class="font-bold text-blue-600">${item.tma} cm</span></p>
                            <p class="text-xs text-slate-600 mb-1">Status: <span class="font-bold uppercase">${item.status}</span></p>
                            <p class="text-[10px] text-slate-400 mt-2 font-medium">${item.waktu}</p>
                        </div>
                    `;

                    const marker = L.marker([lat, lng], { icon: customIcon }).bindPopup(popupContent);
                    markersGroup.current.addLayer(marker);
                    bounds.push([lat, lng]);
                });

                if (bounds.length > 0) {
                    mapInst.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
                }

                setTimeout(() => {
                    if (mapInst.current) mapInst.current.invalidateSize();
                }, 200);

            }, [history, isOnline]);

            const mapContainerClass = darkMode ? "dark-map-tiles" : "";

            if (!isOnline) {
                return (
                    <div className="h-64 md:h-[400px] w-full bg-slate-50 dark:bg-slate-800 flex flex-col items-center justify-center text-slate-400">
                        <Icon name="wifi-off" className="w-10 h-10 mb-3 opacity-50" />
                        <p className="font-medium text-sm">Peta Tidak Tersedia Offline</p>
                    </div>
                );
            }

            return (
                <div className="relative w-full h-64 md:h-[400px] bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700">
                    <div ref={mapRef} className={`absolute inset-0 w-full h-full ${mapContainerClass}`}></div>
                </div>
            );
        };

        const FormLocationMap = ({ latitude, longitude, darkMode, onLocationSelect }) => {
            const mapRef = useRef(null);
            const mapInst = useRef(null);
            const markerRef = useRef(null);

            useEffect(() => {
                if (!mapRef.current) return;

                const defaultLat = -7.75;
                const defaultLng = 112.75;
                const lat = parseFloat(latitude) || defaultLat;
                const lng = parseFloat(longitude) || defaultLng;
                const hasLocation = !isNaN(parseFloat(latitude)) && !isNaN(parseFloat(longitude));

                if (!mapInst.current) {
                    mapInst.current = L.map(mapRef.current, { zoomControl: false, attributionControl: false }).setView([lat, lng], hasLocation ? 13 : 7);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        maxZoom: 19
                    }).addTo(mapInst.current);
                    
                    if (hasLocation) {
                        markerRef.current = L.marker([lat, lng], { draggable: true }).addTo(mapInst.current);
                        
                        markerRef.current.on('dragend', function(e) {
                            const pos = markerRef.current.getLatLng();
                            if (onLocationSelect) onLocationSelect(pos.lat.toFixed(6), pos.lng.toFixed(6));
                        });
                    }

                    mapInst.current.on('click', function(e) {
                        if (onLocationSelect) onLocationSelect(e.latlng.lat.toFixed(6), e.latlng.lng.toFixed(6));
                    });
                } else {
                    if (hasLocation) {
                        mapInst.current.setView([lat, lng], 13);
                        if (!markerRef.current) {
                            markerRef.current = L.marker([lat, lng], { draggable: true }).addTo(mapInst.current);
                            markerRef.current.on('dragend', function(e) {
                                const pos = markerRef.current.getLatLng();
                                if (onLocationSelect) onLocationSelect(pos.lat.toFixed(6), pos.lng.toFixed(6));
                            });
                        } else {
                            markerRef.current.setLatLng([lat, lng]);
                        }
                    } else {
                        mapInst.current.setView([defaultLat, defaultLng], 7);
                        if (markerRef.current) {
                            mapInst.current.removeLayer(markerRef.current);
                            markerRef.current = null;
                        }
                    }
                }

                setTimeout(() => {
                    if (mapInst.current) mapInst.current.invalidateSize();
                }, 100);

            }, [latitude, longitude, onLocationSelect]);

            const mapClass = darkMode ? "dark-map-tiles" : "";

            return (
                <div className="w-full h-full relative overflow-hidden rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
                    <div ref={mapRef} className={`w-full h-full absolute inset-0 ${mapClass}`}></div>
                </div>
            );
        };

        // NEW: SVG Line Chart for TMA Trends (SaaS Level) Responsive Fixes
        const TMAChart = ({ data }) => {
            const [tooltip, setTooltip] = useState(null);
            
            if (!data || data.length === 0) {
                return (
                    <div className="flex items-center justify-center h-48 text-slate-400 dark:text-slate-500 border border-dashed border-slate-200 dark:border-slate-700 rounded-xl">
                        <p className="text-sm font-medium">Belum ada riwayat TMA</p>
                    </div>
                );
            }

            const chartData = data.slice(0, 10).reverse(); 
            const values = chartData.map(h => parseFloat(h.tma) || 0);
            
            const maxVal = Math.max(...values, 10);
            const minVal = Math.max(0, Math.min(...values) - 5); 
            const range = (maxVal - minVal) || 10;
            
            const paddingBottom = range * 0.15;
            const paddingTop = range * 0.25;
            const bottomY = Math.max(0, minVal - paddingBottom);
            const topY = maxVal + paddingTop;
            const adjustedRange = topY - bottomY;

            const width = 400;
            const height = 150;
            const xStep = width / Math.max(chartData.length - 1, 1);

            const getCoordinates = (val, index) => {
                const x = index * xStep;
                const y = height - ((val - bottomY) / adjustedRange) * height;
                return { x, y };
            };

            const points = chartData.map((d, i) => getCoordinates(parseFloat(d.tma) || 0, i));
            
            const pathD = points.length > 0 ? `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}` : '';
            const areaD = points.length > 0 ? `${pathD} L ${width},${height} L 0,${height} Z` : '';

            const renderTooltip = () => {
                if (!tooltip) return null;
                
                const isLeft = tooltip.x < 20;
                const isRight = tooltip.x > 80;
                
                return (
                    <div className="absolute bg-slate-800 dark:bg-slate-700 text-white text-xs py-2 px-3 rounded-lg shadow-xl z-20 pointer-events-none transition-all duration-200" 
                         style={{ 
                             left: isRight ? 'auto' : (isLeft ? `calc(${tooltip.x}% - 10px)` : `${tooltip.x}%`),
                             right: isRight ? `calc(${100 - tooltip.x}% - 10px)` : 'auto',
                             top: `calc(${tooltip.y}px - 15px)`, 
                             transform: `translate(${isLeft ? '0' : (isRight ? '0' : '-50%')}, -100%)`
                         }}>
                        <div className="font-bold text-blue-300 text-sm mb-0.5">{tooltip.tma} cm</div>
                        <div className="text-[10px] font-medium text-slate-300">{tooltip.namaBendung}</div>
                        <div className={`text-[10px] mt-1 font-bold ${tooltip.status?.toLowerCase() !== 'aman' ? 'text-amber-400' : 'text-emerald-400'}`}>{tooltip.status?.toUpperCase()}</div>
                        <div className={`absolute bottom-0 translate-y-full w-0 h-0 border-l-[5px] border-r-[5px] border-t-[5px] border-l-transparent border-r-transparent border-t-slate-800 dark:border-t-slate-700 ${isLeft ? 'left-4' : (isRight ? 'right-4' : 'left-1/2 transform -translate-x-1/2')}`}></div>
                    </div>
                );
            };

            return (
                <div className="relative mt-2">
                    <div className="relative w-full h-48 bg-slate-50/50 dark:bg-slate-900/30 rounded-xl border border-slate-200 dark:border-slate-700 p-4">
                        <svg viewBox={`0 -10 ${width} ${height + 20}`} className="w-full h-full overflow-visible" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="tmaGradient" x1="0" x2="0" y1="0" y2="1">
                                    <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.4" />
                                    <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                                </linearGradient>
                            </defs>
                            
                            {/* Grid Lines */}
                            <line x1="0" y1={height} x2={width} y2={height} stroke="currentColor" className="text-slate-200 dark:text-slate-700" strokeWidth="1" strokeDasharray="4 4" />
                            <line x1="0" y1={height/2} x2={width} y2={height/2} stroke="currentColor" className="text-slate-200 dark:text-slate-700" strokeWidth="1" strokeDasharray="4 4" />
                            <line x1="0" y1="0" x2={width} y2="0" stroke="currentColor" className="text-slate-200 dark:text-slate-700" strokeWidth="1" strokeDasharray="4 4" />
                            
                            {/* Line & Area */}
                            {points.length > 1 && <path d={areaD} fill="url(#tmaGradient)" />}
                            {points.length > 1 && <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-sm" />}
                            
                            {/* Data Points */}
                            {points.map((p, i) => {
                                const isWarning = chartData[i].status && chartData[i].status.toLowerCase() !== 'aman';
                                return (
                                    <g key={i} className="chart-point cursor-pointer" 
                                       onMouseEnter={() => setTooltip({ ...chartData[i], x: (i / (chartData.length - 1 || 1)) * 100, y: p.y })} 
                                       onMouseLeave={() => setTooltip(null)}
                                       onTouchStart={() => setTooltip({ ...chartData[i], x: (i / (chartData.length - 1 || 1)) * 100, y: p.y })}>
                                        <circle cx={p.x} cy={p.y} r="4" 
                                            fill={isWarning ? "#f59e0b" : "#ffffff"} 
                                            stroke={isWarning ? "#b45309" : "#3b82f6"} 
                                            strokeWidth="2" 
                                            className="transition-all duration-200 drop-shadow-md" />
                                        <circle cx={p.x} cy={p.y} r="15" fill="transparent" />
                                    </g>
                                );
                            })}
                        </svg>

                        {/* X-Axis Labels */}
                        <div className="absolute left-4 right-4 bottom-1 md:bottom-2 h-4">
                            {chartData.map((d, i) => {
                                const isStart = i === 0;
                                const isEnd = i === chartData.length - 1;
                                const isMid = i === Math.floor(chartData.length / 2);
                                
                                if (chartData.length > 5 && !isStart && !isEnd && !isMid) return null;
                                
                                return (
                                    <span key={i} className="absolute text-[10px] font-bold text-slate-400 transform -translate-x-1/2 whitespace-nowrap" style={{ left: `${(i / (chartData.length - 1 || 1)) * 100}%` }}>
                                        {d.waktu?.split(' ')[0]?.slice(0, 5)}
                                    </span>
                                )
                            })}
                        </div>
                        
                        {/* Y-Axis Labels */}
                        <div className="absolute left-2 top-4 bottom-8 flex flex-col justify-between text-[9px] font-bold text-slate-400 pointer-events-none">
                            <span>{Math.round(topY)}</span>
                            <span>{Math.round(bottomY + (adjustedRange/2))}</span>
                            <span>{Math.round(bottomY)}</span>
                        </div>
                    </div>

                    {renderTooltip()}
                </div>
            );
        };

        const WhatsAppPreview = ({ data, onConfirm, onCancel, isUploading }) => {
            const [viewImage, setViewImage] = useState(null);
            const previewText = generateMessageFormatter(data);

            return (
                <div className="space-y-5">
                    <div className="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/50 rounded-2xl p-4 md:p-5 shadow-sm">

                    {data.attachments && data.attachments.length > 0 && (

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [darkMode, setDarkMode] = useState(() => {
                if (typeof window !== 'undefined') return localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches;

            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('current_user');

            const [loginForm, setLoginForm] = useState({

            const [loginError, setLoginError] = useState('');
            
            const [history, setHistory] = useState([]);
            const [isDbLoading, setIsDbLoading] = useState(true);
            
            const [userConfig, setUserConfig] = useState(() => {
                const saved = localStorage.getItem('app_config_v2');
                return saved ? JSON.parse(saved) : { 
                    namaPelapor: "IMAM TAUFIK", 
                    defaultBendung: "", 
                    defaultDI: "DI BARU",

            const [bendungList, setBendungList] = useState(() => {
                const saved = localStorage.getItem('preset_bendung_list');
                return saved ? JSON.parse(saved) : [
                    { namaBendung: 'BENDUNG KARANGDORO', namaDI: 'DI BARU', latitude: '-8.412496', longitude: '114.218451', luasKiri: '403', luasKanan: '16165', luasBaku: '16165' },
                    { namaBendung: 'BENDUNG SUMBERMULYO', namaDI: 'DI BARU', latitude: '-8.381200', longitude: '114.221500', luasKiri: '300', luasKanan: '300', luasBaku: '600' },
                    { namaBendung: 'BENDUNG POROLINGGO', namaDI: 'DI POROLINGGO', latitude: '-7.761500', longitude: '113.218500', luasKiri: '250', luasKanan: '250', luasBaku: '500' }
                ];
            });

            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('All');
            const [filterDateRange, setFilterDateRange] = useState({ start: '', end: '' });
            const [filterSynced, setFilterSynced] = useState('all'); 

            const [formData, setFormData] = useState(() => ({
                id: null, 
                namaPelapor: userConfig.namaPelapor || "", 
                namaBendung: userConfig.defaultBendung || "", 
                namaDI: userConfig.defaultDI || "",
                tanggalLaporan: getCurrentDateStr(), jamLaporan: getCurrentTimeStr(),
                tma: "", luasKiri: "", qactKiri: "", qdKiri: "", luasKanan: "", qactKanan: "", qdKanan: "",
                cuaca: "Cerah", status: "Aman", ketCuaca: "", masaTanam: "1", realisasiTanam: "", luasBaku: "",
                latitude: null, longitude: null, attachments: []

            const [formErrors, setFormErrors] = useState({});
            const [formTouched, setFormTouched] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isUploadingImgs, setIsUploadingImgs] = useState(false);
            const [syncProgress, setSyncProgress] = useState(null);
            const [isPulling, setIsPulling] = useState(false); 
            
            const [expandedSection, setExpandedSection] = useState('waktu');

            const sectionMap = {
                tanggalLaporan: 'waktu', jamLaporan: 'waktu',
                namaPelapor: 'lokasi', namaBendung: 'lokasi', tma: 'lokasi', namaDI: 'lokasi', latitude: 'lokasi', longitude: 'lokasi',
                luasKiri: 'kiri', qactKiri: 'kiri', qdKiri: 'kiri',
                luasKanan: 'kanan', qactKanan: 'kanan', qdKanan: 'kanan',
                cuaca: 'cuaca', status: 'cuaca', ketCuaca: 'cuaca',
                masaTanam: 'tanam', realisasiTanam: 'tanam', luasBaku: 'tanam'

            const [manualMode, setManualMode] = useState({ 
                bendung: userConfig.defaultBendung && !BENDUNG_OPTIONS.includes(userConfig.defaultBendung),

            const [showSplash, setShowSplash] = useState(true);
            const [notification, setNotification] = useState(null);
            const [showPreview, setShowPreview] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
            const [deletedItem, setDeletedItem] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(!currentUser);
            const [locationLoading, setLocationLoading] = useState(false);
            const [viewImage, setViewImage] = useState(null);
            
            const formRef = useRef(null);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        let savedHistory = await localforage.getItem('laporan_debit_v3');
                        if (!savedHistory) {
                            const lsHistory = localStorage.getItem('laporan_debit_v2');
                            if (lsHistory) {

                                await localforage.setItem('laporan_debit_v3', savedHistory);

                                savedHistory = [];
                            }
                        }
                        setHistory(savedHistory);

                        if (activeTab === 'form') {
                            let draft = await localforage.getItem('draft_form_v3');
                            if (!draft) {
                                const lsDraft = localStorage.getItem('draft_form');
                                if (lsDraft) draft = JSON.parse(lsDraft);
                            }

                            if (draft) {
                                const lastSaved = new Date(draft.lastSaved);
                                const now = new Date();
                                const hoursDiff = (now - lastSaved) / (1000 * 60 * 60);
                                
                                if (hoursDiff < 24) { 
                                    if (draft.attachment && !draft.attachments) {
                                        draft.attachments = [draft.attachment];
                                        delete draft.attachment;
                                    } else if (!draft.attachments) draft.attachments = [];
                                    
                                    if (!draft.tanggalLaporan) draft.tanggalLaporan = getCurrentDateStr();
                                    if (!draft.jamLaporan) draft.jamLaporan = getCurrentTimeStr();
                                    
                                    setFormData(prev => ({ ...prev, ...draft, lastSaved: undefined }));
                                    setManualMode({ bendung: draft.namaBendung && !BENDUNG_OPTIONS.includes(draft.namaBendung), di: draft.namaDI && !DI_OPTIONS.includes(draft.namaDI) });
                                    showNotification("Draft dimuat otomatis", "info");
                                }
                            }
                        }
                    } catch (e) {
                        console.error("Gagal memuat IndexedDB:", e);
                    } finally {
                        setIsDbLoading(false);
                    }
                };
                
                loadData();
            }, []);

            useEffect(() => {
                if (currentUser && isOnline) {
                    handlePullFromServer();
                    fetchBendungListFromServer();
                }
            }, [currentUser, isOnline]);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 1500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const handleOnline = () => { setIsOnline(true); showNotification("Koneksi internet pulih", "success"); };
                const handleOffline = () => { setIsOnline(false); showNotification("Anda sedang offline. Data akan disimpan lokal.", "warning"); };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            const debouncedAutoSave = useCallback(
                debounce(async (data) => {
                    if (data.namaBendung || data.tma) {
                        try {
                            await localforage.setItem('draft_form_v3', { ...data, lastSaved: new Date().toISOString() });
                        } catch(e) {}
                    }
                }, APP_CONFIG.AUTO_SAVE_INTERVAL),
                []
            );

            useEffect(() => {
                if (activeTab === 'form' && formData.namaBendung && !isDbLoading) {
                    debouncedAutoSave(formData);
                }
            }, [formData, activeTab, debouncedAutoSave, isDbLoading]);

            const safeSaveHistory = async (newHistory) => {
                try {
                    let finalHistory = newHistory;
                    if (newHistory.length > APP_CONFIG.MAX_HISTORY_LIMIT) {
                        const unsynced = newHistory.filter(h => !h.synced);
                        const synced = newHistory.filter(h => h.synced).slice(0, APP_CONFIG.MAX_HISTORY_LIMIT - unsynced.length);
                        finalHistory = [...unsynced, ...synced];
                    }

                    await localforage.setItem('laporan_debit_v3', finalHistory);
                    setHistory(finalHistory);
                } catch (e) {
                    showNotification("Gagal menyimpan data ke IndexedDB.", "error");
                }
            };

            const showNotification = (message, type = "info", onUndo = null) => { setNotification({ message, type, onUndo, id: Date.now() }); };

            const validateField = (name, value) => {
                const errors = {
                    namaPelapor: v => !v?.trim() ? "Wajib diisi" : null,
                    namaBendung: v => !v?.trim() ? "Wajib diisi" : null,
                    tanggalLaporan: v => !v ? "Wajib diisi" : null,
                    jamLaporan: v => !v ? "Wajib diisi" : null,
                    tma: v => {
                        const num = parseFloat(v);
                        if (!v) return "Wajib diisi";
                        if (isNaN(num)) return "Harus angka";
                        if (num < 0) return "Min 0";
                        if (num > 1000) return "Max 1000";
                        return null;
                    }
                };
                return errors[name]?.(value) || null;
            };

            const validateFormRaw = () => {
                const requiredFields = ['namaPelapor', 'namaBendung', 'tma', 'tanggalLaporan', 'jamLaporan'];
                const errors = {};
                requiredFields.forEach(field => { const error = validateField(field, formData[field]); if (error) errors[field] = error; });
                return errors;
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                if (formErrors[name]) setFormErrors(prev => ({ ...prev, [name]: null }));
                if (!formTouched[name]) setFormTouched(prev => ({ ...prev, [name]: true }));
            };

            const handleBlur = (e) => {
                const { name, value } = e.target;
                setFormTouched(prev => ({ ...prev, [name]: true }));
                const error = validateField(name, value);
                if (error) setFormErrors(prev => ({ ...prev, [name]: error }));
            };

            const captureLocation = () => {
                if (!navigator.geolocation) { showNotification("Geolocation tidak didukung browser ini", "warning"); return; }
                setLocationLoading(true);
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        setFormData(prev => ({ ...prev, latitude: pos.coords.latitude.toFixed(6), longitude: pos.coords.longitude.toFixed(6) }));
                        setLocationLoading(false);
                        showNotification("Lokasi berhasil ditangkap", "success");
                    },
                    (err) => {
                        setLocationLoading(false);
                        showNotification("Gagal mendapatkan lokasi. Pastikan izin diaktifkan.", "error");
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
                );
            };

            const handleBendungSelection = (e) => {
                const selectedVal = e.target.value;
                if (selectedVal === 'MANUAL') {
                    setManualMode(prev => ({ ...prev, bendung: true }));
                    setFormData(prev => ({ ...prev, namaBendung: '', namaDI: '', latitude: '', longitude: '', luasKiri: '', luasKanan: '', luasBaku: '' }));
                } else {
                    const preset = bendungList.find(b => b.namaBendung === selectedVal);
                    if (preset) {
                        setFormData(prev => ({
                            ...prev,
                            namaBendung: selectedVal,
                            namaDI: preset.namaDI || prev.namaDI,
                            latitude: preset.latitude || prev.latitude,
                            longitude: preset.longitude || prev.longitude,
                            luasKiri: preset.luasKiri || prev.luasKiri,
                            luasKanan: preset.luasKanan || prev.luasKanan,
                            luasBaku: preset.luasBaku || prev.luasBaku
                        }));
                    } else {
                        setFormData(prev => ({ ...prev, namaBendung: selectedVal }));
                    }
                }
                if (formErrors.namaBendung) setFormErrors(prev => ({ ...prev, namaBendung: null }));
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;
                
                const newAttachments = [];
                for (const file of files) {
                    if (file.size > APP_CONFIG.MAX_FILE_SIZE) { showNotification(`File ${file.name} terlalu besar. Maks. 5MB`, "error"); continue; }
                    
                    let preview = null;
                    if (file.type.startsWith('image/')) {
                        preview = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = new Image();
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    const ctx = canvas.getContext('2d');
                                    const MAX_DIM = 1080;
                                    let width = img.width;
                                    let height = img.height;
                                    
                                    if (width > height) {
                                        if (width > MAX_DIM) { height *= MAX_DIM / width; width = MAX_DIM; }
                                    } else {
                                        if (height > MAX_DIM) { width *= MAX_DIM / height; height = MAX_DIM; }
                                    }
                                    
                                    canvas.width = width;
                                    canvas.height = height;
                                    ctx.drawImage(img, 0, 0, width, height);
                                    resolve(canvas.toDataURL('image/jpeg', APP_CONFIG.COMPRESS_QUALITY));
                                };
                                img.src = event.target.result;
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                    newAttachments.push({ name: file.name, size: file.size, type: file.type, preview: preview });
                }
                
                if (newAttachments.length > 0) {
                    setFormData(prev => ({ ...prev, attachments: [...(prev.attachments || []), ...newAttachments] }));
                }
                e.target.value = '';
            };

            const removeAttachment = (indexToRemove) => {
                setFormData(prev => ({ ...prev, attachments: (prev.attachments || []).filter((_, index) => index !== indexToRemove) }));
            };

            const toggleSection = (id) => {
                setExpandedSection(prev => prev === id ? null : id);
            };

            const handleNextSection = (nextId) => {
                setExpandedSection(nextId);
            };

            const handleSendWhatsApp = async () => {
                const validationErrors = validateFormRaw();
                if (Object.keys(validationErrors).length > 0) {
                    showNotification("Periksa kembali form yang bertanda merah", "error");
                    setFormErrors(validationErrors);
                    
                    const firstErrorField = Object.keys(validationErrors)[0];
                    if (sectionMap[firstErrorField]) {
                        setExpandedSection(sectionMap[firstErrorField]);
                    }
                    return;
                }

                let finalAttachments = [...(formData.attachments || [])];

                if (isOnline && userConfig.gasUrl && !userConfig.gasUrl.includes('DEMO')) {
                    const imagesToUpload = finalAttachments.filter(att => att.preview && !att.driveUrl);
                    if (imagesToUpload.length > 0) {
                        setIsUploadingImgs(true);
                        showNotification("Mempersiapkan link gambar untuk WhatsApp...", "info");
                        try {
                            const uploadPayload = imagesToUpload.map(att => ({ name: att.name, type: att.type, base64: att.preview }));
                            const response = await fetch(userConfig.gasUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'upload_images', images: uploadPayload })
                            });
                            
                            const result = await response.json();
                            if (result.success && result.urls) {
                                let urlIdx = 0;
                                finalAttachments = finalAttachments.map(att => {
                                    if (att.preview && !att.driveUrl) {
                                        return { ...att, preview: null, driveUrl: result.urls[urlIdx++].url }; 
                                    }
                                    return att;
                                });
                                setFormData(prev => ({ ...prev, attachments: finalAttachments }));
                            }
                        } catch (err) {
                            console.error(err);
                            showNotification("Gagal mendapatkan link gambar. Melanjutkan tanpa link.", "warning");
                        } finally {
                            setIsUploadingImgs(false);
                        }
                    }
                }

                setShowPreview(true);
            };

            const confirmSendWhatsApp = async () => {
                setIsSubmitting(true);
                setShowPreview(false);
                
                const dtInfo = formatDateIndo(formData.tanggalLaporan);
                const strWaktu = `${dtInfo.tanggal} ${formData.jamLaporan}`;
                
                const dataToSave = { ...formData };
                
                if (dataToSave.id) {
                    await safeSaveHistory(history.map(item => item.id === dataToSave.id ? { ...dataToSave, waktu: strWaktu, synced: false, lastUpdated: new Date().toISOString() } : item));
                } else {
                    const newRecord = { id: Date.now(), ...dataToSave, waktu: strWaktu, synced: false, createdAt: new Date().toISOString() };
                    await safeSaveHistory([newRecord, ...history]);
                }
                
                localforage.removeItem('draft_form_v3');
                setFormData(getEmptyForm());
                setExpandedSection('waktu');
                setManualMode({ 
                    bendung: userConfig.defaultBendung && !BENDUNG_OPTIONS.includes(userConfig.defaultBendung), 
                    di: userConfig.defaultDI && !DI_OPTIONS.includes(userConfig.defaultDI) 
                });
                
                const text = generateMessageFormatter(dataToSave);
                const encodedText = encodeURIComponent(text);
                
                setTimeout(() => {
                    window.open(`https://wa.me/?text=${encodedText}`, '_blank');
                    setIsSubmitting(false);
                    setActiveTab('dashboard');
                    showNotification("Data disimpan & WhatsApp dibuka", "success");
                }, 300);
            };

            const getEmptyForm = () => ({
                id: null, 
                namaPelapor: userConfig.namaPelapor || "", 
                namaBendung: userConfig.defaultBendung || "", 
                namaDI: userConfig.defaultDI || "",
                tanggalLaporan: getCurrentDateStr(), jamLaporan: getCurrentTimeStr(),
                tma: "", luasKiri: "", qactKiri: "", qdKiri: "", luasKanan: "", qactKanan: "", qdKanan: "",
                cuaca: "Cerah", status: "Aman", ketCuaca: "", masaTanam: "1", realisasiTanam: "", luasBaku: "",
                latitude: null, longitude: null, attachments: []
            });

            const handleNewForm = () => {
                setFormData(getEmptyForm());
                setFormErrors({}); setFormTouched({});
                setExpandedSection('waktu');
                setManualMode({ 
                    bendung: userConfig.defaultBendung && !BENDUNG_OPTIONS.includes(userConfig.defaultBendung), 
                    di: userConfig.defaultDI && !DI_OPTIONS.includes(userConfig.defaultDI) 
                });
                setActiveTab('form');
            };

            const handleEditDraft = (item) => {
                setFormData(item); setFormErrors({}); setFormTouched({});
                setManualMode({ bendung: item.namaBendung && !BENDUNG_OPTIONS.includes(item.namaBendung), di: item.namaDI && !DI_OPTIONS.includes(item.namaDI) });
                setExpandedSection('waktu');
                setActiveTab('form');
                showNotification("Draft dimuat.", "info");
            };

            const handleDeleteRequest = (item) => { setDeletedItem(item); setShowDeleteConfirm(item.id); };

            const confirmDelete = async () => {
                const updatedHistory = history.filter(item => item.id !== deletedItem?.id);
                await safeSaveHistory(updatedHistory);

                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.history && Array.isArray(data.history)) {
                            const existingIds = new Set(history.map(h => String(h.id)));
                            const newRecords = data.history.filter(h => !existingIds.has(String(h.id)));
                            if (newRecords.length > 0) { await safeSaveHistory([...newRecords, ...history]); showNotification(`${newRecords.length} data diimpor`, "success"); } 
                            else { showNotification("Tidak ada data baru", "info"); }
                            if (data.config && confirm("Terapkan pengaturan dari file backup?")) setUserConfig(data.config);
                        } else { throw new Error("Format tidak valid"); }
                    } catch (err) { showNotification("Gagal mengimpor file.", "error"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

                const unsyncedData = history.filter(item => !item.synced);
                if (unsyncedData.length === 0) return showNotification("Semua data lokal sudah sinkron.", "success");

                setSyncProgress({ current: 0, total: unsyncedData.length, status: 'syncing' });
                showNotification("Menyinkronkan laporan...", "info");

                try {
                    const response = await fetch(userConfig.gasUrl, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify({ action: 'sync', records: unsyncedData })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success && result.syncedRecords) {
                        const syncedRecordsObj = {};
                        result.syncedRecords.forEach(r => syncedRecordsObj[r.id] = r);
                        
                        await safeSaveHistory(history.map(item => syncedRecordsObj[item.id] ? syncedRecordsObj[item.id] : item));
                        setSyncProgress(null);
                        showNotification(`Berhasil sinkron ${result.syncedRecords.length} laporan!`, "success");
                    } else {
                        throw new Error(result.message || "Gagal menyimpan");

                        body: JSON.stringify({ action: 'pull' })
                    });

                    if (result.success && result.data) {

                        await safeSaveHistory([...localUnsynced, ...serverData]);

                                                            <div className="flex flex-col items-center">
                                                                <div className="w-12 h-12 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full flex items-center justify-center mb-3 shadow-sm">
                                                                    <Icon name="camera" className="w-5 h-5 text-slate-400 dark:text-slate-500" decorative={true} />
                                                                </div>
                                                                <p className="font-bold text-slate-700 dark:text-slate-300 text-sm mb-1">Unggah Lampiran</p>
                                                                <p className="text-[11px] text-slate-500 dark:text-slate-400 max-w-xs mx-auto leading-relaxed">
                                                                    Pilih beberapa foto peilschale TMA atau video. Maksimal 5MB per file.
                                                                </p>
                                                                <input type="file" multiple accept="image/*,video/*" onChange={handleFileUpload} className="hidden" aria-label="Unggah foto atau video" />
                                                            </div>
                                                        </label>
                                                    )}
                                                </div>
                                                <p className="text-[10px] font-medium text-slate-500 dark:text-slate-400 mt-3 text-center flex justify-center items-center gap-1.5">
                                                    <Icon name="wifi" className="w-3 h-3 opacity-70" /> Jika terhubung internet, lampiran otomatis menjadi link WA.
                                                </p>
                                            </div>
                                        </CollapsibleSection>

                                        {/* ACTION BUTTON */}
                                        <div className="mt-6 pb-6">
                                            <button type="submit" disabled={isSubmitting || isUploadingImgs} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed focus-ring">
                                                {isSubmitting || isUploadingImgs ? (
                                                    <><Icon name="loader" className="w-5 h-5" decorative={false} title="Memproses" /><span>Memproses Data...</span></>
                                                ) : (
                                                    <><Icon name="send" className="w-5 h-5 text-white" decorative={true} /><span>{formData.id ? 'Perbarui & Buat WA' : 'Kirim WA & Simpan Lokal'}</span></>
                                                )}
                                            </button>
                                        </div>
                                    </form>
                                )}

                                {/* SETTINGS TAB */}
                                {activeTab === 'settings' && (
                                    <div className="max-w-4xl mx-auto space-y-6 md:space-y-8">
                                        <div className="mb-4 md:mb-6">
                                            <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white tracking-tight">Pengaturan Sistem</h2>
                                            <p className="text-sm md:text-base text-slate-500 dark:text-slate-400 font-medium mt-1.5">
                                                Sesuaikan preferensi Anda untuk pengalaman pelaporan yang lebih efisien.
                                            </p>
                                        </div>

                                        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                                            <FormSectionHeader icon="user" title="Preferensi Dasar" theme="blue" />
                                            <div className="p-5 md:p-6 space-y-5">
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                    <div>
                                                        <label htmlFor="cfg-nama" className="text-xs font-bold text-slate-600 dark:text-slate-400 block mb-1.5 required">Nama Pelapor Default</label>
                                                        <input id="cfg-nama" type="text" value={userConfig.namaPelapor} onChange={(e) => setUserConfig({...userConfig, namaPelapor: e.target.value})} className="pro-input" placeholder="Nama lengkap Anda" />
                                                    </div>
                                                    <div>
                                                        <label htmlFor="cfg-bendung" className="text-xs font-bold text-slate-600 dark:text-slate-400 block mb-1.5">Bendung Default</label>
                                                        <select id="cfg-bendung" value={userConfig.defaultBendung} onChange={(e) => setUserConfig({...userConfig, defaultBendung: e.target.value})} className="pro-input cursor-pointer">
                                                            <option value="">(Kosongkan)</option>
                                                            {bendungList.map(opt => <option key={opt.namaBendung} value={opt.namaBendung}>{opt.namaBendung}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label htmlFor="cfg-di" className="text-xs font-bold text-slate-600 dark:text-slate-400 block mb-1.5">Daerah Irigasi Default</label>
                                                        <select id="cfg-di" value={userConfig.defaultDI} onChange={(e) => setUserConfig({...userConfig, defaultDI: e.target.value})} className="pro-input cursor-pointer">
                                                            <option value="">(Kosongkan)</option>
                                                            {DI_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 dark:bg-slate-800/80 px-5 py-4 border-t border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row gap-3 justify-end items-center">
                                                <button onClick={() => setUserConfig({ ...userConfig, namaPelapor: "IMAM TAUFIK", defaultBendung: "", defaultDI: "DI BARU" })} className="px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 font-bold text-xs transition-colors focus-ring w-full sm:w-auto">Kembalikan ke Default</button>
                                                <button onClick={saveSettings} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg flex items-center justify-center gap-2 shadow-sm transition-all focus-ring"><Icon name="check-circle-2" className="w-4 h-4" decorative={true} />Simpan Preferensi</button>
                                            </div>
                                        </div>

                                        {/* HANYA ADMIN YANG BISA EDIT GAS URL & MANAJEMEN DATA */}
                                        {currentUser?.role === 'admin' && (
                                            <>
                                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                                                    <FormSectionHeader icon="settings" title="Pengaturan Server (Admin Only)" theme="amber" />
                                                    <div className="p-5 md:p-6 space-y-5">
                                                        <div>
                                                            <label htmlFor="cfg-gas" className="text-xs font-bold text-slate-600 dark:text-slate-400 block mb-1.5 required">URL Google Apps Script</label>
                                                            <input id="cfg-gas" type="url" value={userConfig.gasUrl} onChange={(e) => setUserConfig({...userConfig, gasUrl: e.target.value})} className="pro-input font-mono text-[11px] md:text-xs text-slate-500" placeholder="https://script.google.com/..." />
                                                        </div>
                                                        <div className="flex items-center justify-end">
                                                            <button onClick={saveSettings} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 hover:border-amber-500 dark:hover:border-amber-400 text-amber-600 dark:text-amber-400 font-bold py-2.5 px-6 rounded-lg flex items-center justify-center gap-2 shadow-sm transition-all focus-ring"><Icon name="check-circle-2" className="w-4 h-4" decorative={true} />Simpan Server</button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                                                    <FormSectionHeader icon="cloud-download" title="Manajemen Database (Admin Only)" theme="violet" />
                                                    <div className="p-5 md:p-6 space-y-4">
                                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl gap-4">
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-900 dark:text-white">Backup Seluruh Data</p>
                                                                <p className="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5 leading-relaxed">Ekspor semua laporan yang ada di HP Anda ke file JSON.</p>
                                                            </div>
                                                            <button onClick={handleExportJSON} className="px-5 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 hover:border-violet-500 text-violet-600 dark:text-violet-400 rounded-lg text-xs font-bold transition-all focus-ring whitespace-nowrap"><Icon name="download" className="w-4 h-4 inline-block mr-1.5" />Unduh JSON</button>
                                                        </div>
                                                        
                                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl gap-4">
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-900 dark:text-white">Restore Data (Pulihkan)</p>
                                                                <p className="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5 leading-relaxed">Pilih file JSON hasil backup untuk memulihkan data.</p>
                                                            </div>
                                                            <label className="px-5 py-2.5 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-xs font-bold transition-all shadow-sm cursor-pointer focus-ring whitespace-nowrap text-center">
                                                                <Icon name="upload" className="w-4 h-4 inline-block mr-1.5" />Pilih File JSON
                                                                <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" aria-label="Pilih file backup untuk diimpor" />
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                            </>
                                        )}

                                        <div className="text-center pt-8 pb-4 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest leading-loose">
                                            <p className="text-blue-500 dark:text-blue-400">E-DEBIT Enterprise v4.0</p>
                                            <p>UPT Pengelolaan Sumber Daya Air • Provinsi Jawa Timur</p>
                                            <p className="text-[9px] mt-1 opacity-70">Clean SaaS UI • Offline-First</p>
                                        </div>
                                    </div>
                                )}

                            </div>
                        </div>

                        <nav className="md:hidden fixed bottom-0 w-full bg-white/95 dark:bg-slate-800/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-700 px-2 py-2 pb-3 flex justify-between z-30 transition-colors" style={{ paddingBottom: 'calc(var(--safe-area-bottom) + 0.5rem)' }} role="navigation" aria-label="Navigasi utama">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center w-1/3 p-2 relative transition-colors touch-target focus-ring ${activeTab === 'dashboard' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'}`} aria-current={activeTab === 'dashboard' ? 'page' : undefined}>
                                <div className="relative">
                                    <Icon name="layout-dashboard" className={`w-6 h-6 mb-1 transition-transform ${activeTab === 'dashboard' ? 'scale-110 drop-shadow-md' : ''}`} decorative={true} />
                                    {stats.unsynced > 0 && activeTab !== 'dashboard' && (<span className="absolute -top-1 -right-1 bg-red-500 w-2.5 h-2.5 rounded-full border-2 border-white dark:border-slate-800 animate-pulse"></span>)}
                                </div>
                                <span className={`text-[10px] tracking-wide transition-all ${activeTab === 'dashboard' ? 'font-bold' : 'font-medium'}`}>Dashboard</span>
                            </button>
                            <button onClick={handleNewForm} className={`flex flex-col items-center justify-center w-1/3 p-2 transition-colors touch-target focus-ring ${activeTab === 'form' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'}`} aria-current={activeTab === 'form' ? 'page' : undefined}>
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center -mt-5 mb-0.5 shadow-sm transition-transform duration-300 ${activeTab === 'form' ? 'bg-blue-600 text-white scale-110' : 'bg-white dark:bg-slate-700 text-slate-400 dark:text-slate-300 border border-slate-200 dark:border-slate-600'}`}>
                                    <Icon name="plus" className="w-6 h-6" decorative={true} />
                                </div>
                                <span className={`text-[10px] tracking-wide transition-all ${activeTab === 'form' ? 'font-bold' : 'font-medium'}`}>Buat Baru</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center w-1/3 p-2 transition-colors touch-target focus-ring ${activeTab === 'settings' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'}`} aria-current={activeTab === 'settings' ? 'page' : undefined}>
                                <Icon name="settings" className={`w-6 h-6 mb-1 transition-transform ${activeTab === 'settings' ? 'scale-110 drop-shadow-md' : ''}`} decorative={true} />
                                <span className={`text-[10px] tracking-wide transition-all ${activeTab === 'settings' ? 'font-bold' : 'font-medium'}`}>Pengaturan</span>
                            </button>
                        </nav>
                    </main>

                    <Modal isOpen={showLoginModal && !currentUser} onClose={() => {}} title="Autentikasi Sistem" role="dialog">
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div className="text-center mb-6">
                                <div className="inline-flex items-center justify-center w-20 h-20 mb-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-4 relative">
                                    <img src={APP_LOGO_URL} alt="Logo" className="w-full h-full object-contain relative z-10" />
                                </div>
                                <h3 className="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Selamat Datang</h3>
                                <p className="text-[11px] font-medium text-slate-500 dark:text-slate-400 mt-1 uppercase tracking-widest">E-Debit PSDA Jatim</p>
                            </div>
                            <div className="px-2 space-y-4">
                                <div>
                                    <label htmlFor="email" className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5 required">Email Terdaftar</label>
                                    <input id="email" type="email" name="email" value={loginForm.email} onChange={(e) => setLoginForm({...loginForm, email: e.target.value})} className="pro-input" placeholder="petugas@psda.jatim.go.id" required autoComplete="email" />
                                </div>
                                <div>
                                    <label htmlFor="password" className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-1.5 required">Password</label>
                                    <input id="password" type="password" name="password" value={loginForm.password} onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} className="pro-input" placeholder="Masukkan password Anda" required />
                                </div>
                            </div>
                            {loginError && (<p className="error-message px-2 flex items-start gap-2"><Icon name="alert-triangle" className="w-4 h-4 shrink-0 mt-0.5" /><span>{loginError}</span></p>)}
                            <div className="pt-2 px-2">
                                <button type="submit" disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 dark:bg-slate-700 disabled:text-slate-500 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] focus-ring shadow-sm disabled:shadow-none">
                                    {isSubmitting ? (<><Icon name="loader" className="w-5 h-5" /><span>Otentikasi...</span></>) : ('Masuk ke Aplikasi')}
                                </button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={showPreview} onClose={() => setShowPreview(false)} title="Konfirmasi Laporan" actions={null}>
                        <WhatsAppPreview data={formData} onConfirm={confirmSendWhatsApp} onCancel={() => setShowPreview(false)} isUploading={isUploadingImgs} />
                    </Modal>

                    <Modal isOpen={!!showDeleteConfirm} onClose={() => { setShowDeleteConfirm(null); setDeletedItem(null); }} title="Hapus Laporan?" actions={
                        <>
                            <button onClick={() => { setShowDeleteConfirm(null); setDeletedItem(null); }} className="px-5 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors focus-ring text-sm">Batal</button>
                            <button onClick={confirmDelete} className="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold flex items-center gap-2 transition-colors focus-ring shadow-sm text-sm"><Icon name="trash-2" className="w-4 h-4" decorative={true} />Ya, Hapus Data</button>
                        </>
                    }>
                        <div className="space-y-4">
                            <div className="flex items-start gap-3 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-xl">
                                <Icon name="alert-triangle" className="w-5 h-5 text-red-600 dark:text-red-400 flex-shrink-0" decorative={true} />
                                <div><p className="font-bold text-red-800 dark:text-red-200 text-sm">Tindakan ini tidak dapat diurungkan</p><p className="text-[11px] font-medium text-red-700 dark:text-red-300 mt-1 leading-relaxed">Anda memiliki opsi "Undo" selama 5 detik setelah penghapusan.</p></div>
                            </div>
                            {deletedItem && (
                                <div className="p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg">
                                    <p className="font-bold text-slate-800 dark:text-white text-sm">{deletedItem.namaBendung}</p>
                                    <p className="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5">{deletedItem.waktu}</p>
                                </div>
                            )}
                        </div>
                    </Modal>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
